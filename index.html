<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dark Script — Игра с ИИ (Прогресс)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1e1e2e;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }

        /* Боковая панель с прогрессом */
        .sidebar {
            width: 280px;
            background-color: #15161e;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid #2a2a3a;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7c7f9a;
            margin-bottom: 16px;
        }

        .progress-item {
            margin-bottom: 20px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: #a0a0c0;
        }
        .progress-bar-bg {
            background-color: #2a2a3a;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background-color: #7c3aed;
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .progress-bar-fill.sanity {
            background-color: #f97316;
        }

        .topic-input {
            width: 100%;
            background: #1a1b26;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
        }

        .topics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .topic-tag {
            background: #1a1b26;
            border: 1px solid #2a2a3a;
            color: #a0a0c0;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .topic-tag:hover {
            background: #2a2a3a;
            border-color: #7c3aed;
            color: #e0e0e0;
        }

        .btn-primary {
            width: 100%;
            background: #7c3aed;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        .btn-primary:hover { background: #6d28d9; }
        .btn-secondary {
            background: #3a3a4a;
            margin-top: 8px;
        }
        .btn-secondary:hover { background: #4a4a6a; }

        /* Основная область */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid #2a2a3a;
            background: #1e1e2e;
        }
        .chat-header h1 { font-size: 18px; font-weight: 500; }
        .chat-header p { font-size: 12px; color: #7c7f9a; margin-top: 4px; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
        }
        .message {
            margin-bottom: 24px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 500;
            color: #a0a0c0;
        }
        .message-icon { width: 18px; height: 18px; }
        .message-content {
            background: #181926;
            padding: 14px 18px;
            border-radius: 10px;
            line-height: 1.6;
            font-size: 14px;
            border-left: 2px solid #7c3aed;
            color: #d0d0e0;
        }
        .user-message .message-content {
            border-left-color: #4a4a6a;
            background: #15161e;
        }
        .input-area {
            padding: 20px 32px 28px;
            border-top: 1px solid #2a2a3a;
            background: #1e1e2e;
        }
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-wrapper input {
            flex: 1;
            background: #181926;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
        }
        .input-wrapper input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        .send-btn {
            background: #2a2a3a;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            color: #a0a0c0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .send-btn:hover:not(:disabled) {
            background: #7c3aed;
            color: white;
        }
        .status-bar {
            padding: 8px 32px;
            background: #15161e;
            border-top: 1px solid #2a2a3a;
            font-size: 12px;
            color: #7c7f9a;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4ade80;
        }
        .status-dot.waiting { background-color: #f97316; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e2e; }
        ::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #7c7f9a; }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 40%;
                border-right: none;
                border-bottom: 1px solid #2a2a3a;
                padding: 12px 0;
            }
            .sidebar-section {
                padding: 0 16px 12px 16px;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .messages {
                padding: 16px;
            }
            .input-area {
                padding: 12px 16px 20px;
            }
            .status-bar {
                padding: 6px 16px;
            }
            .message-content {
                font-size: 15px;
                padding: 12px 14px;
            }
            .btn-primary {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Левая панель с прогрессом -->
    <div class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">ЦЕЛИ И СОСТОЯНИЕ</div>
            <div class="progress-item">
                <div class="progress-label"><span>🔍 Улики</span><span id="cluesCount">0</span><span>/ <span id="maxClues">3</span></span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="cluesBar" style="width: 0%;"></div></div>
            </div>
            <div class="progress-item">
                <div class="progress-label"><span>🧠 Рассудок</span><span id="sanityValue">100</span><span>%</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill sanity" id="sanityBar" style="width: 100%;"></div></div>
            </div>
            <div class="sidebar-title" style="margin-top: 20px;">НОВАЯ ИСТОРИЯ</div>
            <input type="text" id="topicInput" class="topic-input" placeholder="например: нуар-детектив в 80-х">
            <div class="topics-grid">
                <span class="topic-tag" data-topic="Психологический хоррор">Хоррор</span>
                <span class="topic-tag" data-topic="Киберпанк-детектив">Киберпанк</span>
                <span class="topic-tag" data-topic="Фэнтези про тёмного мага">Фэнтези</span>
                <span class="topic-tag" data-topic="Космическая опера">Космос</span>
                <span class="topic-tag" data-topic="Викторианский детектив">Детектив</span>
                <span class="topic-tag" data-topic="Постапокалипсис">Постап</span>
            </div>
            <button class="btn-primary" id="startBtn"><i data-lucide="play" style="width: 16px; height: 16px;"></i> Начать игру</button>
            <button class="btn-primary btn-secondary" id="resetBtn"><i data-lucide="refresh-cw" style="width: 16px; height: 16px;"></i> Новая игра</button>
        </div>
    </div>

    <!-- Основная область -->
    <div class="main">
        <div class="chat-header">
            <h1 id="gameTitle">Dark Script</h1>
            <p id="gameSubtitle">выберите тему и начните приключение</p>
        </div>
        <div class="messages" id="messagesContainer">
            <div class="empty-state"><i data-lucide="book-open" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i><p>Нет активной игры</p><p style="font-size: 12px; margin-top: 8px;">выберите тему слева</p></div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="ваше действие..." disabled>
                <button class="send-btn" id="sendBtn" disabled><i data-lucide="send" style="width: 18px; height: 18px;"></i></button>
            </div>
        </div>
        <div class="status-bar"><div class="status-dot" id="statusDot"></div><span id="statusText">готов</span></div>
    </div>
</div>

<script>
    // ==================================================
    // ТВОЙ OPENROUTER КЛЮЧ (ЗАМЕНИ НА АКТУАЛЬНЫЙ, ЕСЛИ НУЖНО)
    const API_KEY = 'AQVNzdc2nFo6euhGYkqoPz8XvR0XmerRbsfGw4_j';
    // ==================================================

    // Проверка наличия ключа
    if (!API_KEY || API_KEY === 'AQVNzdc2nFo6euhGYkqoPz8XvR0XmerRbsfGw4_j' && confirm('Вы используете тестовый ключ? Если игра не работает, возможно, ключ недействителен.')) {
        console.warn('API_KEY не задан или используется тестовый.');
    }

    let currentTopic = '';
    let messagesHistory = [];
    let isWaiting = false;
    let gameActive = true;
    let clues = 0;
    let sanity = 100;
    const MAX_CLUES = 3;
    const SANITY_START = 100;

    // Элементы UI
    const cluesSpan = document.getElementById('cluesCount');
    const cluesBar = document.getElementById('cluesBar');
    const sanitySpan = document.getElementById('sanityValue');
    const sanityBar = document.getElementById('sanityBar');

    function updateProgressUI() {
        cluesSpan.innerText = clues;
        cluesBar.style.width = (clues / MAX_CLUES) * 100 + '%';
        sanitySpan.innerText = sanity;
        sanityBar.style.width = sanity + '%';
    }

    function resetGameState() {
        clues = 0;
        sanity = SANITY_START;
        gameActive = true;
        messagesHistory = [];
        updateProgressUI();
        document.getElementById('messagesContainer').innerHTML = '';
        document.getElementById('gameTitle').innerText = 'Dark Script';
        document.getElementById('gameSubtitle').innerText = 'выберите тему и начните приключение';
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        userInput.disabled = true;
        sendBtn.disabled = true;
        userInput.value = '';
        setStatus('готов', false);
        // Очищаем пустое состояние, если оно есть
        const container = document.getElementById('messagesContainer');
        if (container.children.length === 0) {
            container.innerHTML = '<div class="empty-state"><i data-lucide="book-open" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i><p>Нет активной игры</p><p style="font-size: 12px; margin-top: 8px;">выберите тему слева</p></div>';
            lucide.createIcons();
        }
    }

    function endGame(win, epilogue) {
        gameActive = false;
        addMessage(epilogue, false);
        addMessage(win ? '🏆 ПОБЕДА! Вы раскрыли тайну.' : '💀 ПОРАЖЕНИЕ. Рассудок потерян...', false);
        addMessage('Нажмите «Новая игра», чтобы начать заново.', false);
        document.getElementById('userInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        setStatus('игра завершена', false);
    }

    function parseProgressFromText(text) {
        let newClues = null;
        let newSanity = null;
        const cluesMatch = text.match(/Улики:\s*(\d+)\s*\/\s*(\d+)/i);
        if (cluesMatch) newClues = parseInt(cluesMatch[1]);
        const sanityMatch = text.match(/Рассудок:\s*(\d+)%/i);
        if (sanityMatch) newSanity = parseInt(sanityMatch[1]);
        return { clues: newClues, sanity: newSanity };
    }

    function applyProgress(newClues, newSanity) {
        if (!gameActive) return;
        let changed = false;
        if (newClues !== null && newClues >= 0 && newClues <= MAX_CLUES) {
            if (newClues !== clues) changed = true;
            clues = newClues;
        }
        if (newSanity !== null && newSanity >= 0 && newSanity <= 100) {
            if (newSanity !== sanity) changed = true;
            sanity = newSanity;
        }
        if (changed) updateProgressUI();

        if (clues >= MAX_CLUES && gameActive) {
            endGame(true, '✨ Вы собрали все улики и разгадали тайну. Истина открылась перед вами.');
        } else if (sanity <= 0 && gameActive) {
            endGame(false, '😵 Ваш разум не выдержал ужасов... Вы теряете связь с реальностью.');
        }
    }

    async function callOpenRouter(userMessage, isFirstMessage = false) {
        let systemPrompt;
        if (isFirstMessage) {
            systemPrompt = `Ты — мастер повествования в жанре "${currentTopic}".
Цель игры: найти ${MAX_CLUES} улик, чтобы раскрыть тайну. Начальное состояние: улик 0/${MAX_CLUES}, рассудок 100%.
ПРАВИЛА:
- Твои ответы должны быть на русском, атмосферными, 3-5 предложений.
- В конце каждого ответа добавляй строку с текущим состоянием в формате: "Улики: X/${MAX_CLUES}. Рассудок: Y%."
- Если игрок делает что-то, что помогает расследованию (находит зацепку, разговаривает со свидетелем, находит предмет), увеличивай улики на 1 (но не больше максимума).
- Если игрок совершает опасные или глупые действия (идёт в одиночку в тёмный подвал, вступает в конфликт с монстром, теряет самообладание) — снижай рассудок на 10-20%.
- При достижении ${MAX_CLUES} улик — завершай игру победой и напиши эпилог.
- При рассудке 0% — завершай игру поражением.
- В первом сообщении опиши место, атмосферу, загадку и поставь игрока в ситуацию, где он должен начать искать улики. Не забудь указать начальное состояние: Улики: 0/${MAX_CLUES}. Рассудок: 100%.`;
        } else {
            systemPrompt = `Ты — мастер повествования в жанре "${currentTopic}".
Текущее состояние: улик ${clues}/${MAX_CLUES}, рассудок ${sanity}%.
Правила те же: после каждого ответа указывай новое состояние в формате "Улики: X/${MAX_CLUES}. Рассудок: Y%.".
Изменяй улики и рассудок в зависимости от действий игрока. Если игра завершена (победа или поражение) — просто напиши эпилог и перестань менять состояние.`;
        }

        let messages = [{ role: "system", content: systemPrompt }];
        const lastMessages = messagesHistory.slice(-10);
        for (let msg of lastMessages) {
            messages.push({ role: msg.isUser ? "user" : "assistant", content: msg.text });
        }
        messages.push({ role: "user", content: userMessage });

        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "openrouter/free",
                    messages: messages,
                    max_tokens: 600,
                    temperature: 0.85
                })
            });
            const data = await response.json();
            if (data.error) {
                console.error('OpenRouter error:', data.error);
                return `Ошибка API: ${data.error.message || JSON.stringify(data.error)}`;
            }
            if (data.choices && data.choices[0] && data.choices[0].message) {
                return data.choices[0].message.content;
            } else {
                return `Неожиданный ответ от API: ${JSON.stringify(data)}`;
            }
        } catch(e) {
            console.error('Fetch error:', e);
            return `Ошибка соединения: ${e.message}. Возможно, нужен VPN или ключ недействителен.`;
        }
    }

    async function startGame() {
        if (isWaiting) return;
        resetGameState();
        let topic = document.getElementById('topicInput').value.trim();
        if (!topic) topic = "таинственное приключение";
        currentTopic = topic;
        document.getElementById('gameTitle').innerText = topic.length > 40 ? topic.slice(0, 40) + '…' : topic;
        document.getElementById('gameSubtitle').innerText = `жанр: ${topic}`;

        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        userInput.disabled = false;
        sendBtn.disabled = false;
        isWaiting = true;
        setStatus("ИИ создаёт мир...", true);
        const firstScene = await callOpenRouter("Создай детальное, атмосферное начало игры, введи игрока в ситуацию и задай вопрос.", true);
        addMessage(firstScene, false);
        messagesHistory.push({ text: firstScene, isUser: false });
        const progress = parseProgressFromText(firstScene);
        applyProgress(progress.clues, progress.sanity);
        isWaiting = false;
        setStatus("ваш ход", false);
        userInput.focus();
    }

    async function sendMessage() {
        if (isWaiting || !gameActive) return;
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;
        addMessage(text, true);
        messagesHistory.push({ text: text, isUser: true });
        input.value = '';
        isWaiting = true;
        setStatus("история продолжается...", true);
        const reply = await callOpenRouter(text, false);
        addMessage(reply, false);
        messagesHistory.push({ text: reply, isUser: false });
        const progress = parseProgressFromText(reply);
        applyProgress(progress.clues, progress.sanity);
        isWaiting = false;
        if (gameActive) setStatus("ваш ход", false);
        input.focus();
    }

    function addMessage(text, isUser) {
        const container = document.getElementById('messagesContainer');
        const empty = container.querySelector('.empty-state');
        if (empty) empty.remove();
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
        const iconName = isUser ? 'user' : 'bot';
        const sender = isUser ? 'Вы' : 'Мастер истории';
        const escapedText = text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
        messageDiv.innerHTML = `<div class="message-meta"><i data-lucide="${iconName}" class="message-icon"></i><span>${sender}</span></div><div class="message-content">${escapedText.replace(/\n/g, '<br>')}</div>`;
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
        lucide.createIcons();
    }

    function setStatus(text, isWaitingStatus = false) {
        const statusText = document.getElementById('statusText');
        const dot = document.getElementById('statusDot');
        statusText.innerText = text;
        if (isWaitingStatus) dot.classList.add('waiting');
        else dot.classList.remove('waiting');
    }

    // Инициализация
    lucide.createIcons();
    document.querySelectorAll('.topic-tag').forEach(tag => {
        tag.addEventListener('click', () => {
            document.getElementById('topicInput').value = tag.getAttribute('data-topic');
        });
    });
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('resetBtn').addEventListener('click', () => { resetGameState(); });
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled && !isWaiting && gameActive) {
            sendMessage();
        }
    });
    resetGameState();
</script>
</body>
</html>
