<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dark Script — Obsidian | Игра с ИИ</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 25% 0%, #16161e, #0f0f17);
            color: #e2e2e8;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', monospace;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* SIDEBAR — Obsidian стиль */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 100%;
            background: rgba(25, 25, 35, 0.92);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(124, 58, 237, 0.25);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 1020;
            box-shadow: 8px 0 32px rgba(0,0,0,0.4);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            z-index: 1010;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .sidebar-section {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }

        .sidebar-title {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #a78bfa;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Карточки статистики */
        .stat-card {
            background: rgba(15, 15, 22, 0.7);
            border-radius: 1rem;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(124, 58, 237, 0.2);
            transition: all 0.2s;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #b9b9d8;
        }

        .stat-value {
            color: #c084fc;
            font-family: monospace;
            font-weight: 700;
        }

        .progress-bar {
            background: #2a2a3a;
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #7c3aed, #c084fc);
            width: 0%;
            height: 100%;
            border-radius: 20px;
            transition: width 0.35s ease;
        }

        .faction-item {
            background: rgba(20, 20, 28, 0.6);
            border-radius: 0.75rem;
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.5rem;
        }

        .inventory-tag {
            background: #1e1e2a;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            display: inline-block;
            margin: 0.2rem;
        }

        /* Кнопки */
        .btn {
            width: 100%;
            padding: 0.7rem;
            border-radius: 1rem;
            font-weight: 700;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.1s linear;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid #3a3a52;
            color: #e2e2e8;
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
            background: rgba(15, 15, 23, 0.7);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #c084fc;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            animation: slideUp 0.2s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            background: rgba(20, 20, 28, 0.8);
            backdrop-filter: blur(4px);
            border-left: 3px solid #7c3aed;
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .user-message .message-content {
            border-left-color: #f97316;
            background: rgba(30, 30, 40, 0.9);
        }

        /* Выборы — кнопки */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 12px 0 8px;
        }

        .choice-btn {
            background: #1a1a26;
            border: 1px solid #2d2d44;
            border-radius: 1rem;
            padding: 0.9rem 1rem;
            color: #f0f0ff;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
        }

        .choice-btn:active {
            background: #2a2a3e;
            transform: scale(0.98);
        }

        .badge {
            font-size: 0.7rem;
            background: #0c0c14;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-family: monospace;
        }

        .status-bar {
            background: #0c0c14;
            border-top: 1px solid #2a2a3a;
            padding: 0.7rem 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #9ca3af;
        }

        @media (min-width: 768px) {
            .menu-btn {
                display: none;
            }
            .sidebar {
                transform: translateX(0);
                position: relative;
                backdrop-filter: none;
            }
            .overlay {
                display: none !important;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #14141c;
        }
        ::-webkit-scrollbar-thumb {
            background: #7c3aed;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title"><i data-lucide="dices"></i> ХАРАКТЕРИСТИКИ</div>
            <div class="stat-card"><div class="stat-header"><span>💪 СИЛА</span><span id="strengthVal" class="stat-value">5</span></div><div class="progress-bar"><div class="progress-fill" id="strengthFill" style="width: 50%"></div></div></div>
            <div class="stat-card"><div class="stat-header"><span>✨ ХАРИЗМА</span><span id="charismaVal" class="stat-value">5</span></div><div class="progress-bar"><div class="progress-fill" id="charismaFill" style="width: 50%"></div></div></div>
            <div class="stat-card"><div class="stat-header"><span>🧠 ИНТЕЛЛЕКТ</span><span id="intellectVal" class="stat-value">5</span></div><div class="progress-bar"><div class="progress-fill" id="intellectFill" style="width: 50%"></div></div></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-title"><i data-lucide="users"></i> ФРАКЦИИ</div>
            <div id="factionsContainer"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-title"><i data-lucide="package"></i> ИНВЕНТАРЬ</div>
            <div id="invContainer"></div>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-title"><i data-lucide="activity"></i> СОСТОЯНИЕ</div>
            <div class="stat-card"><div class="stat-header"><span>🔍 УЛИКИ</span><span id="cluesVal">0/3</span></div><div class="progress-bar"><div class="progress-fill" id="cluesFill" style="width: 0%"></div></div></div>
            <div class="stat-card"><div class="stat-header"><span>🧠 РАССУДОК</span><span id="sanityVal">100%</span></div><div class="progress-bar"><div class="progress-fill" id="sanityFill" style="width: 100%; background:#f97316"></div></div></div>
            <div class="stat-card"><div class="stat-header"><span>⚠️ НАПРЯЖЕНИЕ</span><span id="tensionVal">0%</span></div><div class="progress-bar"><div class="progress-fill" id="tensionFill" style="width:0%; background:#dc2626"></div></div></div>
        </div>
        <div class="sidebar-section">
            <input type="text" id="topicInput" placeholder="Тема (тёмное фэнтези, нуар...)" style="background:#101018; border:1px solid #2a2a3a; color:#fff; padding:10px; border-radius:12px; width:100%; margin-bottom:12px;">
            <button class="btn btn-primary" id="startBtn"><i data-lucide="sparkles"></i> НАЧАТЬ ИГРУ</button>
            <button class="btn btn-secondary" id="saveBtn"><i data-lucide="save"></i> СОХРАНИТЬ</button>
            <button class="btn btn-secondary" id="loadBtn"><i data-lucide="folder-open"></i> ЗАГРУЗИТЬ</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn">☰</button>
            <h2 id="gameTitle" style="font-weight:500">DARK SCRIPT</h2>
            <span style="font-size:10px; background:#1e1e2e; padding:2px 8px; border-radius:40px">⚔️ на максимум</span>
        </div>
        <div class="messages" id="messagesContainer">
            <div class="empty-state" style="text-align:center; opacity:0.6; margin-top:20%">🌑 Жми «Начать игру»<br>↯ каждое решение — вес</div>
        </div>
        <div class="status-bar">
            <span id="statusText">готов</span>
            <button id="shareBtn" style="background:none; border:none; color:#a78bfa; font-size:12px">📤 экспорт истории</button>
        </div>
    </div>
</div>

<script>
    // ======================= ИГРОВОЕ СОСТОЯНИЕ =======================
    let game = {
        clues: 0, sanity: 100, tension: 0,
        strength: 5, charisma: 5, intellect: 5,
        inventory: [],
        memory: [],
        factions: {
            "Городская стража": 0,
            "Преступный синдикат": 0,
            "Культ пустоты": 0
        },
        gameActive: true,
        started: false,
        currentTopic: "нуарное безумие",
        messages: [],
        turn: 0
    };
    let isWaiting = false;

    // UI обновление
    function updateUI() {
        document.getElementById('strengthVal').innerText = game.strength;
        document.getElementById('strengthFill').style.width = (game.strength/10)*100+'%';
        document.getElementById('charismaVal').innerText = game.charisma;
        document.getElementById('charismaFill').style.width = (game.charisma/10)*100+'%';
        document.getElementById('intellectVal').innerText = game.intellect;
        document.getElementById('intellectFill').style.width = (game.intellect/10)*100+'%';
        document.getElementById('cluesVal').innerText = `${game.clues}/3`;
        document.getElementById('cluesFill').style.width = (game.clues/3)*100+'%';
        document.getElementById('sanityVal').innerText = game.sanity+'%';
        document.getElementById('sanityFill').style.width = game.sanity+'%';
        document.getElementById('tensionVal').innerText = game.tension+'%';
        document.getElementById('tensionFill').style.width = game.tension+'%';
        let invHtml = game.inventory.map(i => `<span class="inventory-tag">📦 ${i}</span>`).join('');
        if(!game.inventory.length) invHtml = '<span style="opacity:0.5; font-size:12px";>пустота</span>';
        document.getElementById('invContainer').innerHTML = invHtml;
        let factionsHtml = '';
        for(let [name, val] of Object.entries(game.factions)) {
            let percent = ((val+50)/100)*100;
            factionsHtml += `<div class="faction-item"><div style="display:flex; justify-content:space-between"><span>${name}</span><span>${val>0?'+':''}${val}</span></div><div class="progress-bar"><div style="background:#f97316; width:${Math.min(100,Math.max(0,percent))}%; height:4px; border-radius:6px;"></div></div></div>`;
        }
        document.getElementById('factionsContainer').innerHTML = factionsHtml;
        lucide.createIcons();
    }

    function addMessage(text, isUser) {
        const container = document.getElementById('messagesContainer');
        if(container.querySelector('.empty-state')) container.innerHTML = '';
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
        msgDiv.innerHTML = `<div class="message-content">${text.replace(/\n/g,'<br>')}</div>`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        game.messages.push({text, isUser});
    }

    function setStatus(txt, wait=false) {
        document.getElementById('statusText').innerHTML = txt;
    }

    // Риск-бросок + эффекты
    function calculateChance(stat, difficulty) {
        let base = stat * 10;
        if(difficulty === 'hard') base -= 25;
        if(difficulty === 'easy') base += 20;
        return Math.min(92, Math.max(8, base));
    }

    async function resolveAction(choice) {
        if(!game.gameActive) return;
        let chance = calculateChance(choice.statValue, choice.diff);
        let roll = Math.random() * 100;
        let resultType = '';
        let effects = {};
        if(roll <= chance) {
            if(roll <= chance * 0.2) { resultType = 'critical_success'; effects = choice.critSuccess || { clues:1, sanity:5 }; }
            else { resultType = 'success'; effects = choice.success || {}; }
        } else {
            if(roll >= 95) { resultType = 'critical_failure'; effects = choice.critFail || { sanity:-15, tension:15 }; }
            else { resultType = 'failure'; effects = choice.failure || {}; }
        }
        // анимация куба
        setStatus(`🎲 ${Math.floor(roll)}% vs ${chance}%`, true);
        await new Promise(r=>setTimeout(r,200));
        // применить эффекты
        if(effects.clues) game.clues = Math.min(3, game.clues + effects.clues);
        if(effects.sanity) game.sanity = Math.min(100, Math.max(0, game.sanity + effects.sanity));
        if(effects.tension) game.tension = Math.min(100, Math.max(0, game.tension + effects.tension));
        if(effects.strength) game.strength = Math.min(10, Math.max(0, game.strength + effects.strength));
        if(effects.charisma) game.charisma = Math.min(10, Math.max(0, game.charisma + effects.charisma));
        if(effects.intellect) game.intellect = Math.min(10, Math.max(0, game.intellect + effects.intellect));
        if(effects.inventory) game.inventory.push(...effects.inventory);
        if(effects.faction) for(let [f,val] of Object.entries(effects.faction)) if(game.factions[f]!==undefined) game.factions[f] += val;
        if(effects.memory) game.memory.unshift(effects.memory);
        updateUI();
        addMessage(`⚡ ${choice.text} → ${resultType.replace('_',' ').toUpperCase()}`, true);
        if(game.clues>=3) return finishGame("ПОБЕДА: вы распутали заговор миров.");
        if(game.sanity<=0) return finishGame("ПОРАЖЕНИЕ: рассудок shattered — вы слышите голоса вечности.");
        if(game.tension>=100) return finishGame("⚠️ КРИЗИС: враги нападают, вы не готовы.");
        // Генерация следующего поворота (без API — встроенный генератор)
        await generateNextTurn(choice.text, resultType);
    }

    async function generateNextTurn(lastAction, resultType) {
        if(isWaiting) return;
        isWaiting = true;
        setStatus("🧠 мир обновляется...", true);
        await new Promise(r=>setTimeout(r, 400));
        let flavorText = `[${game.currentTopic.toUpperCase()}] ${lastAction} — ${resultType === 'success' ? 'удача улыбнулась' : resultType === 'critical_success' ? 'звёзды сошлись' : 'рок вмешался'}. Напряжение ${game.tension}%`;
        addMessage(flavorText, false);
        // 3 варианта действий
        const actionsPool = [
            { text: "💪 Проломить силой", stat:'strength', diff:'hard', success:{ clues:1 }, failure:{ sanity:-8, tension:10 }, critSuccess:{ clues:2, inventory:["Обломок двери"] }, critFail:{ sanity:-20, tension:25 } },
            { text: "✨ Обмануть/убедить", stat:'charisma', diff:'medium', success:{ faction:{"Городская стража":5} }, failure:{ sanity:-5, tension:5 }, critSuccess:{ faction:{"Городская стража":12}, inventory:["Печать"] }, critFail:{ sanity:-15, faction:{"Городская стража":-10} } },
            { text: "🧠 Анализ окружения", stat:'intellect', diff:'easy', success:{ clues:1, inventory:["Тайная записка"] }, failure:{ tension:4 }, critSuccess:{ clues:1, sanity:10, memory:"анализ помог" } },
            { text: "🕯️ Взывать к теням", stat:'charisma', diff:'hard', success:{ sanity:-5, clues:1 }, failure:{ sanity:-15, tension:15 }, critSuccess:{ sanity:5, inventory:["Реликвия"] } },
            { text: "🏃 Уйти в тень", stat:'intellect', diff:'easy', success:{ tension:-10 }, failure:{ tension:8 }, critSuccess:{ sanity:8 } }
        ];
        let shuffled = [...actionsPool].sort(()=>0.5-Math.random());
        let choices = shuffled.slice(0,3);
        const container = document.getElementById('messagesContainer');
        let old = container.querySelector('.choices-container');
        if(old) old.remove();
        let div = document.createElement('div');
        div.className = 'choices-container';
        for(let opt of choices) {
            let statVal = game[opt.stat];
            let chance = calculateChance(statVal, opt.diff);
            let btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerHTML = `<span>[${opt.stat.toUpperCase()} ${statVal}] ${opt.text}</span><span class="badge">${chance}%</span>`;
            btn.onclick = () => resolveAction({
                text: opt.text,
                statValue: statVal,
                diff: opt.diff,
                success: opt.success || {},
                failure: opt.failure || {},
                critSuccess: opt.critSuccess || { sanity:5 },
                critFail: opt.critFail || { sanity:-15, tension:15 }
            });
            div.appendChild(btn);
        }
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
        isWaiting = false;
        setStatus("ваш ход ▷", false);
        updateUI();
    }

    async function startGame() {
        let topic = document.getElementById('topicInput').value.trim();
        if(topic) game.currentTopic = topic;
        game = {
            clues:0, sanity:100, tension:0,
            strength:5, charisma:5, intellect:5,
            inventory:[], memory:[],
            factions:{"Городская стража":0,"Преступный синдикат":0,"Культ пустоты":0},
            gameActive:true, started:true,
            currentTopic: game.currentTopic,
            messages:[], turn:0
        };
        document.getElementById('messagesContainer').innerHTML = '';
        updateUI();
        addMessage(`🌑 ИГРА НАЧАЛАСЬ. Жанр: ${game.currentTopic}. Мир дышит, фракции следят. Выберите путь.`, false);
        await generateNextTurn("старт", "neutral");
    }

    function finishGame(msg) {
        game.gameActive = false;
        addMessage(`🎭 ${msg} 🎭 Игра окончена. Нажмите «Начать игру» для новой судьбы.`, false);
        setStatus("конец", false);
    }

    function saveGame() {
        localStorage.setItem('dark_obsidian', JSON.stringify({state:game, history:game.messages}));
        addMessage("💾 Сохранено в Obsidian-пространство", false);
    }
    function loadGame() {
        let raw = localStorage.getItem('dark_obsidian');
        if(raw) {
            let data = JSON.parse(raw);
            game = data.state;
            game.messages = data.history || [];
            document.getElementById('messagesContainer').innerHTML = '';
            for(let m of game.messages) addMessage(m.text, m.isUser);
            updateUI();
            addMessage("📀 Загрузка завершена. Продолжаем.", false);
        } else addMessage("Нет сохранений", false);
    }
    function shareHistory() {
        let text = `DARK SCRIPT — ${game.currentTopic}\nУлики:${game.clues}/3 | Рассудок:${game.sanity}% | Напряжение:${game.tension}%\nИнв:${game.inventory.join(', ')}\n\n`;
        for(let m of game.messages) text += `${m.isUser ? '> ' : ''}${m.text}\n\n`;
        let blob = new Blob([text], {type:'text/plain'});
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `dark_script_${Date.now()}.txt`;
        a.click();
    }

    // UI события
    document.getElementById('startBtn').onclick = startGame;
    document.getElementById('saveBtn').onclick = saveGame;
    document.getElementById('loadBtn').onclick = loadGame;
    document.getElementById('shareBtn').onclick = shareHistory;
    document.getElementById('menuBtn').onclick = ()=>{
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('active');
    };
    document.getElementById('overlay').onclick = ()=>{
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
    };
    updateUI();
    lucide.createIcons();
    setStatus("готов | выбери тему");
</script>
</body>
</html>
