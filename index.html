// FIX #1: РЕМОНТ ОБРЕЗАННОГО JSON
// Если API обрезал ответ — пробуем закрыть скобки
// ══════════════════════════════════════════════════
function repairJSON(str) {
  let s = str.trim();
  // Убираем незакрытые строки в конце
  // Считаем скобки
  let inStr=false, esc=false, braces=0, brackets=0, lastGoodPos=0;
  for(let i=0;i<s.length;i++){
    const c=s[i];
    if(esc){esc=false;continue}
    if(c==='\\'){esc=true;continue}
    if(c==='"'){inStr=!inStr;continue}
    if(inStr)continue;
    if(c==='{')braces++;
    if(c==='}'){braces--;lastGoodPos=i}
    if(c==='[')brackets++;
    if(c===']'){brackets--;lastGoodPos=i}
  }
  // Если внутри строки — закрываем строку
  if(inStr) s += '"';
  // Убираем висящие запятые перед закрытием
  s = s.replace(/,\s*$/,'');
  // Закрываем незакрытые скобки
  while(brackets>0){s+=']';brackets--}
  while(braces>0){s+='}';braces--}
  return s;
}

// ══════════════════════════════════════════════════
// FIX #2: МНОГОСЛОЙНЫЙ ПАРСИНГ JSON
// 4 стратегии — от простой к агрессивной
// ══════════════════════════════════════════════════
function parseJSON(raw) {
  if(!raw || typeof raw !== 'string') throw new Error('Пустой ответ от API');

  let text = raw.trim();
  // Снимаем markdown-обёртку
  text = text.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim();

  // Стратегия 1: прямой парсинг
  try { return validateScene(JSON.parse(text)); } catch(e) {}

  // Стратегия 2: извлечь первый {…} блок
  const m = text.match(/\{[\s\S]*\}/);
  if(m){
    try { return validateScene(JSON.parse(m[0])); } catch(e) {}
    // Стратегия 3: ремонт извлечённого блока
    try { return validateScene(JSON.parse(repairJSON(m[0]))); } catch(e) {}
  }

  // Стратегия 4: ремонт всего текста
  try { return validateScene(JSON.parse(repairJSON(text))); } catch(e) {}

  // Стратегия 5: экстремальная — собираем минимальный JSON из текста
  try { return extractMinimalScene(text); } catch(e) {}

  console.error('RAW RESPONSE (все стратегии провалились):', raw.substring(0, 500));
  throw new Error('Не удалось разобрать ответ ИИ');
}

// Проверяем что JSON имеет нужную структуру и дополняем пустоты
function validateScene(obj) {
  if(!obj || typeof obj !== 'object') throw new Error('Не объект');
  // Минимум — narrative должен быть
  if(!obj.narrative && !obj.choices) throw new Error('Нет контента');

  return {
    narrative: obj.narrative || 'Реальность мерцает. Ты моргаешь. Мир всё ещё здесь — к сожалению.',
    voices: Array.isArray(obj.voices) ? obj.voices : [],
    choices: Array.isArray(obj.choices) && obj.choices.length > 0
      ? obj.choices.map(c => ({
          text: c.text || 'Продолжить',
          skill_check: c.skill_check || null,
          consequences: {
            sanity: c.consequences?.sanity || 0,
            tension: c.consequences?.tension || 0,
            add_item: c.consequences?.add_item || null,
            add_title: c.consequences?.add_title || null,
            add_clue: c.consequences?.add_clue || null,
            faction_guard: c.consequences?.faction_guard || null,
            faction_syndicate: c.consequences?.faction_syndicate || null,
            unlock_shadow: c.consequences?.unlock_shadow || false,
            next_scene_hint: c.consequences?.next_scene_hint || ''
          }
        }))
      : [{text:'Продолжить',skill_check:null,consequences:{sanity:0,tension:3,add_item:null,add_title:null,add_clue:null,faction_guard:null,faction_syndicate:null,unlock_shadow:false,next_scene_hint:'продолжение'}}],
    state_changes: obj.state_changes || {sanity:0,tension:0}
  };
}

// Крайний случай: вытаскиваем narrative из текста, делаем кнопку «Продолжить»
function extractMinimalScene(text) {
  // Ищем хоть какой-то текст
  let narr = text
    .replace(/[{}$$$$"]/g,' ')
    .replace(/narrative|voices|choices|consequences|skill_check/gi,'')
    .replace(/\s+/g,' ').trim();
  if(narr.length < 10) throw new Error('Нет текста');
  if(narr.length > 1500) narr = narr.substring(0,1500)+'...';
  return validateScene({narrative: narr});
}

// ══════════════════════════════════════════════════
// FIX #3: API ВЫЗОВ С РЕТРАЯМИ
// 3 попытки, пауза растёт, промпт сокращается
// ══════════════════════════════════════════════════
async function callAI(msg, attempt=1) {
  const r = REALITIES[S.reality];
  const sysP = buildPrompt(r.setting, r.factions);

  // При каждом ретрае — берём МЕНЬШЕ истории
  const histLimit = Math.max(2, CFG.MAX_HIST - (attempt-1)*2);
  const msgs = [{role:'system', content: sysP}];
  S.hist.slice(-histLimit).forEach(h => msgs.push({role:h.r, content:h.c}));

  // Контекст — тоже сжимаем при ретраях
  const short = attempt > 1;
  const stCtx = short
    ? `[А:${S.act} Р:${S.san}% Н:${S.ten}% С:${S.stats.strength} Х:${S.stats.charisma} И:${S.stats.intelligence} У:${S.clues.length}/3 Тень:${S.flags.shadowUnlocked?1:0}] ${msg}`
    : `[СОСТОЯНИЕ] Акт:${S.act} Сцена#${S.scene} Рассудок:${S.san}% Напряжение:${S.ten}% СИЛ:${S.stats.strength} ХАР:${S.stats.charisma} ИНТ:${S.stats.intelligence} Улики:${S.clues.length}/3${S.clues.length?' ('+S.clues.join('; ')+')':''} Инвентарь:${S.inv.join(', ')||'—'} Титулы:${S.titles.join(', ')||'—'} Тень:${S.flags.shadowUnlocked?'ДА':'НЕТ'} Реальность:${r.name}\n[ДЕЙСТВИЕ] ${msg}`;

  msgs.push({role:'user', content:stCtx});

  try {
    const resp = await fetch(CFG.URL, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+CFG.KEY
      },
      body: JSON.stringify({
        model: CFG.MODEL,
        max_tokens: CFG.MAX_TOKENS,
        temperature: attempt > 1 ? 0.7 : 0.88, // при ретрае — менее рандомно
        messages: msgs
      })
    });

    // ── Обработка HTTP-ошибок ──
    if(!resp.ok){
      const errBody = await resp.text().catch(()=>'');
      const status = resp.status;

      // Rate limit — ждём дольше
      if(status === 429) {
        if(attempt < CFG.RETRIES) {
          const wait = CFG.RETRY_MS[attempt-1] * 2; // удвоенная пауза для rate limit
          console.warn(`Rate limit (429). Жду ${wait}ms, попытка ${attempt+1}...`);
          await new Promise(r=>setTimeout(r, wait));
          return callAI(msg, attempt+1);
        }
      }
      throw new Error(`HTTP ${status}: ${errBody.substring(0,150)}`);
    }

    const data = await resp.json();
    const content = data.choices?.[0]?.message?.content || '';

    if(!content){
      throw new Error('API вернул пустой content');
    }

    // Сохраняем в историю ТОЛЬКО при успехе
    S.hist.push({r:'user', c:stCtx}, {r:'assistant', c:content});

    // Обрезаем историю до лимита
    if(S.hist.length > CFG.MAX_HIST * 2) {
      S.hist = S.hist.slice(-CFG.MAX_HIST);
    }

    return parseJSON(content);

  } catch(err) {
    console.warn(`API attempt ${attempt}/${CFG.RETRIES} failed:`, err.message);

    if(attempt < CFG.RETRIES) {
      const wait = CFG.RETRY_MS[attempt-1] || 3000;
      updateLoadText(`Помехи на линии... повтор через ${Math.round(wait/1000)}с (${attempt}/${CFG.RETRIES})`);
      await new Promise(r=>setTimeout(r, wait));
      return callAI(msg, attempt+1);
    }
    throw err;
  }
}

        {name:"Инстинкт",icon:"⚡",text:"Слева — звуки. Значит, слева — опасность. Или возможность. В этом городе разница академическая."},
        {name:"Эго",icon:"👑",text:"Мы стоим в коридоре и выбираем. Как настоящий детектив. Не важно, что мы не помним, что мы детектив. Стиль не забывается."}
      ],
      choices:[
        {text:"Пойти на звуки",skill_check:{stat:"charisma",dc:10},consequences:{sanity:-2,tension:5,add_item:null,add_title:null,add_clue:null,faction_guard:null,faction_syndicate:null,unlock_shadow:false,next_scene_hint:"встреча с незнакомцем"}},
        {text:"Пойти в тишину",skill_check:null,consequences:{sanity:2,tension:3,add_item:null,add_title:null,add_clue:null,faction_guard:null,faction_syndicate:null,unlock_shadow:false,next_scene_hint:"пустой тупик с находкой"}},
        {text:"Осмотреть стены коридора",skill_check:{stat:"intelligence",dc:12},consequences:{sanity:-1,tension:0,add_item:null,add_title:null,add_clue:null,faction_guard:null,faction_syndicate:null,unlock_shadow:false,next_scene_hint:"надпись на стене"}}
      ],
      state_changes:{sanity:0,tension:2}
    },
    {
      narrative:"Ты находишь комнату — маленькую, душную, с единственной лампочкой, которая мигает так, будто отсчитывает чьё-то терпение. На столе — стакан воды. Вода мутная. Рядом — записка, придавленная чем-то тяжёлым.\n\nЗа стеной кто-то кашляет. Долго, надрывно, как человек, который давно махнул рукой на здоровье и теперь здоровье отвечает взаимностью.",
      voices:[
        {name:"Логика",icon:"🧠",text:"Лампочка мигает с интервалом 3-4 секунды. Неисправность проводки. Или сигнал. При нашем везении — второе."},
        {name:"Инстинкт",icon:"⚡",text:"Воду НЕ ПИТЬ. Записку — читать. Кашель — игнорировать. Если зовут по имени — тоже игнорировать. У нас нет имени. Удобно."}
      ],
      choices:[
        {text:"Прочитать записку",skill_check:null,consequences:{sanity:-3,tension:5,add_item:"Мятая записка",add_title:null,add_clue:null,faction_guard:null,faction_syndicate:null,unlock_shadow:false,next_scene_hint:"записка с адресом"}},
        {text:"Постучать в стену — кашляющему",skill_check:{stat:"charisma",dc:11},consequences:{sanity:0,tension:8,add_item:null,add_title:null,add_clue:null,faction_guard:null,faction_syndicate:null,unlock_shadow:false,next_scene_hint:"сосед отвечает"}},
        {text:"Выпить воду",skill_check:{stat:"strength",dc:8},consequences:{sanity:5,tension:0,add_item:null,add_title:"Рисковый",add_clue:null,faction_guard:null,faction_syndicate:null,unlock_shadow:false,next_scene_hint:"ничего не произошло... или нет?"}}
      ],
      state_changes:{sanity:-1,tension:2}
    }
  ];
  return scenarios[Math.floor(Math.random()*scenarios.length)];
}

// ═══ РЕНДЕРИНГ ═══
function fmtNarr(t){
  if(!t)return'';
  return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .split(/\n\n|\n/).filter(p=>p.trim())
    .map(p=>`<p>${p.trim()}</p>`).join('');
}
function voiceCls(n){
  if(n.includes('Инстинкт'))return'vb-inst';
  if(n.includes('Логика'))return'vb-logic';
  if(n.includes('Эго'))return'vb-ego';
  return'vb-shadow';
}
function renderScene(d){
  const nr=document.getElementById('narr'),ch=document.getElementById('choices');
  let h=`<div class="n-text fade-in">${fmtNarr(d.narrative)}</div>`;
  if(d.voices)d.voices.forEach((v,i)=>{
    if(v.name&&v.name.includes('Тень')&&!S.flags.shadowUnlocked)return;
    h+=`<div class="vb ${voiceCls(v.name||'')}" style="animation-delay:${i*.18}s"><div class="vn">${v.icon||''} ${v.name||'???'}</div><div class="vt">«${v.text||'...'}»</div></div>`;
  });
  nr.innerHTML=h;
  setTimeout(()=>nr.scrollTop=nr.scrollHeight,50);
  if(d.choices?.length){
    ch.innerHTML=d.choices.map((c,i)=>{
      let sk='';
      if(c.skill_check){
        const nm={strength:'Сила',charisma:'Харизма',intelligence:'Интеллект'};
        sk=`<span class="sk">[${nm[c.skill_check.stat]||'???'} DC${c.skill_check.dc||10}]</span>`;
      }
      return`<button class="ch" onclick="makeChoice(${i})">${c.text||'Продолжить'}${sk}</button>`;
    }).join('');
    ch.style.display='block';
  }else ch.style.display='none';
  if(d.state_changes){
    if(d.state_changes.sanity)S.san=clamp(S.san+d.state_changes.sanity,0,100);
    if(d.state_changes.tension)S.ten=clamp(S.ten+d.state_changes.tension,0,100);
  }
}
function applyCons(c){
  if(!c)return;
  if(c.sanity)S.san=clamp(S.san+c.sanity,0,100);
  if(c.tension)S.ten=clamp(S.ten+c.tension,0,100);
  if(c.add_item&&!S.inv.includes(c.add_item))S.inv.push(c.add_item);
  if(c.add_title&&!S.titles.includes(c.add_title))S.titles.push(c.add_title);
  if(c.add_clue&&!S.clues.includes(c.add_clue)&&S.clues.length<3)S.clues.push(c.add_clue);
  if(c.faction_guard)S.fac.guard+=c.faction_guard;
  if(c.faction_syndicate)S.fac.syndicate+=c.faction_syndicate;
  if(c.unlock_shadow)S.flags.shadowUnlocked=true;
}

// ═══ ОБНОВЛЕНИЕ UI ═══
function updateUI(){
  const ts=document.getElementById('t-san'),tt=document.getElementById('t-ten');
  ts.textContent=S.san+'%';tt.textContent=S.ten+'%';
  document.getElementById('t-clu').textContent=S.clues.length+'/3';
  ts.className='vl'+(S.san<30?' crit':S.san<50?' warn':'');
  tt.className='vl'+(S.ten>70?' crit':S.ten>50?' warn':'');
  [['strength','str'],['charisma','cha'],['intelligence','int']].forEach(([s,k])=>{
    document.getElementById('b-'+k).style.width=(S.stats[s]*10)+'%';
    document.getElementById('v-'+k).textContent=S.stats[s];
  });
  const bs=document.getElementById('b-san');
  bs.style.width=S.san+'%';bs.style.background=S.san<30?'var(--danger)':'var(--v-logic)';
  document.getElementById('v-san').textContent=S.san+'%';
  document.getElementById('b-ten').style.width=S.ten+'%';
  document.getElementById('v-ten').textContent=S.ten+'%';
  document.getElementById('san-sec').classList.toggle('san-crit',S.san<25);
  const m=document.getElementById('main');
  m.classList.remove('insane-1','insane-2','insane-3');
  if(S.san<20)m.classList.add('insane-3');
  else if(S.san<35)m.classList.add('insane-2');
  else if(S.san<50)m.classList.add('insane-1');
  document.getElementById('sc-cl').textContent=S.clues.length;
  const cl=document.getElementById('ls-cl');
  cl.innerHTML=S.clues.length?S.clues.map(c=>`<div class="sb-item sb-clue">📎 ${c}</div>`).join(''):'<div class="sb-empty">Пусто</div>';
  const il=document.getElementById('ls-inv');
  il.innerHTML=S.inv.length?S.inv.map(i=>`<div class="sb-item">• ${i}</div>`).join(''):'<div class="sb-empty">Карманы пусты</div>';
  const tl=document.getElementById('ls-tit');
  tl.innerHTML=S.titles.length?S.titles.map(t=>`<div class="sb-item sb-title">[${t}]</div>`).join(''):'<div class="sb-empty">Пока никто</div>';
  const fl=document.getElementById('ls-fac'),r=REALITIES[S.reality];
  const fd=(n,v)=>`<div class="fac-row"><span class="fac-n">${n}</span><span class="fac-v ${v>0?'pos':v<0?'neg':'neu'}">${v>0?'+':''}${v}</span></div>`;
  let fh=fd(r.factions[0],S.fac.guard)+fd(r.factions[1],S.fac.syndicate);
  fh+=S.fac.cult!==null?fd(r.factions[2],S.fac.cult):'<div class="fac-h">??? — неизвестно</div>';
  fl.innerHTML=fh;
}

// ═══ ЗАГРУЗКА ═══
function showLoad(v){
  document.getElementById('loader').classList.toggle('on',v);
  document.getElementById('choices').style.display=v?'none':'block';
}
function updateLoadText(txt){
  const ld=document.querySelector('.ld-txt');
  if(ld) ld.textContent=txt;
}

// ══════════════════════════════════════════════════
// ГЛАВНЫЙ ДВИЖОК
// ══════════════════════════════════════════════════
async function requestScene(action){
  if(isLoading) return; // ← блокируем двойные запросы
  isLoading=true;
  lastAct=action;
  showLoad(true);
  updateLoadText('Реальность формируется');

  try {
    const d = await callAI(action);
    curScene=d; S.scene++;
    renderScene(d); updateUI(); checkEnd(); saveGame();
  } catch(err) {
    console.error('Все попытки провалились:', err);

    // ── Показываем фоллбэк вместо ошибки ──
    const fb = generateFallback();
    fb.narrative = `*Помехи на линии реальности. Сигнал нестабилен.*\n\n${fb.narrative}`;
    curScene=fb; S.scene++;
    renderScene(fb); updateUI(); saveGame();

    // Маленький индикатор что был фоллбэк
    document.getElementById('narr').insertAdjacentHTML('afterbegin',
      `<div class="err" style="margin-bottom:12px">⚡ Связь нестабильна — сцена сгенерирована локально. <button onclick="this.parentElement.remove();retryScene()">Переподключиться</button></div>`
    );
  } finally {
    isLoading=false;
    showLoad(false);
  }
}

async function retryScene(){
  if(lastAct) await requestScene(lastAct);
}

async function makeChoice(i){
  if(isLoading || !curScene?.choices?.[i]) return;
  const c=curScene.choices[i];
  document.querySelectorAll('.ch').forEach(b=>b.disabled=true);
  let desc=`Игрок выбрал: "${c.text}"`;
  if(c.skill_check){
    const{stat,dc}=c.skill_check;
    const roll=rollD20(),mod=getMod(stat);
    const r=await showDice(roll,mod,dc||10,stat);
    if(r.c20)desc+=` | КРИТ-УСПЕХ nat20! ${roll}${mod>=0?'+':''}${mod}=${r.total} vs DC${dc}. НЕВЕРОЯТНЫЙ успех!`;
    else if(r.c1)desc+=` | КРИТ-ПРОВАЛ nat1! ЭПИЧЕСКИ СМЕШНОЙ провал! Дай титул.`;
    else if(r.ok)desc+=` | Успех. ${roll}${mod>=0?'+':''}${mod}=${r.total} vs DC${dc}.`;
    else desc+=` | Провал. ${roll}${mod>=0?'+':''}${mod}=${r.total} vs DC${dc}. СМЕШНОЙ провал.`;
  }
  applyCons(c.consequences);
  if(S.act===1&&S.clues.length>=2&&S.scene>=5){S.act=2;desc+=' [АКТ 2]'}
  if(S.act===2&&(S.clues.length>=3||S.scene>=15)){S.act=3;S.fac.cult=0;desc+=' [АКТ 3]'}
  updateUI();
  const hint=c.consequences?.next_scene_hint;
  if(hint)desc+=` Далее: ${hint}`;
  await requestScene(desc);
}

function checkEnd(){
  if(S.san<=0)return showEnd('Эхо','Голоса слились в один. Ты улыбаешься. Как те трупы.','🌑 «Черновик»');
  if(S.ten>=100)return showEnd('Перезапись','Город сомкнулся. Ты знал слишком много.','⚡ «Стёртая плёнка»');
}
function showEnd(t,tx,sub){
  document.getElementById('e-t').textContent=t;
  document.getElementById('e-tx').innerHTML=tx;
  document.getElementById('e-st').innerHTML=`${sub}<br><br>Рассудок:${S.san}% Напряжение:${S.ten}%<br>Улики:${S.clues.length}/3 Титулы:${S.titles.length}<br>Сцен:${S.scene} Акт:${S.act}<br>${REALITIES[S.reality].name}`;
  goTo('s-end');localStorage.removeItem('ds_save');
}

// ═══ СОХРАНЕНИЕ ═══
function saveGame(){try{localStorage.setItem('ds_save',JSON.stringify(S))}catch(e){}}
function tryLoad(){
  try{
    const d=localStorage.getItem('ds_save');if(!d)return;
    S=JSON.parse(d);
    applyTheme(S.reality);
    goTo('s-game');
    setTimeout(()=>{updateUI();requestScene('Продолжение. Акт '+S.act+'. Напомни контекст кратко, дай выборы.')},600);
  }catch(e){console.warn(e)}
}

// ═══ ИНИТ ═══
document.addEventListener('DOMContentLoaded',()=>{
  if(localStorage.getItem('ds_save'))document.getElementById('btn-cont').style.display='';
  document.addEventListener('click',e=>{
    const s=document.getElementById('side'),b=document.getElementById('mob-btn');
    if(s&&s.classList.contains('open')&&!s.contains(e.target)&&!b.contains(e.target))s.classList.remove('open');
  });
});
</script>
