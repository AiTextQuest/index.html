<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dark Script — игра с ИИ (Полная версия)</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1e1e2e;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Боковая панель */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background-color: #15161e;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 0;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .sidebar-section {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid #2a2a3a;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7c7f9a;
            margin-bottom: 16px;
        }

        /* Характеристики */
        .stats-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #1a1b26;
            padding: 10px 12px;
            border-radius: 10px;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: #a0a0c0;
        }

        .stat-name {
            font-weight: 600;
        }

        .stat-value {
            color: #7c3aed;
            font-weight: 700;
        }

        .stat-bar-bg {
            background-color: #2a2a3a;
            border-radius: 6px;
            height: 4px;
            overflow: hidden;
        }

        .stat-bar-fill {
            background-color: #7c3aed;
            width: 0%;
            height: 100%;
            border-radius: 6px;
            transition: width 0.3s ease;
        }

        /* Инвентарь */
        .inventory-list {
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .inventory-item {
            background: #1a1b26;
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .inventory-item-name {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .inventory-item-effect {
            font-size: 10px;
            color: #7c3aed;
        }

        .empty-inventory {
            color: #7c7f9a;
            font-size: 12px;
            text-align: center;
            padding: 12px;
        }

        /* Блок прогресса */
        .progress-item {
            margin-bottom: 20px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 6px;
            color: #a0a0c0;
        }
        .progress-bar-bg {
            background-color: #2a2a3a;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background-color: #7c3aed;
            width: 0%;
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
        .progress-bar-fill.sanity {
            background-color: #f97316;
        }

        .topic-input {
            width: 100%;
            background: #1a1b26;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 16px;
        }

        .topic-input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .topics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .topic-tag {
            background: #1a1b26;
            border: 1px solid #2a2a3a;
            color: #a0a0c0;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            touch-action: manipulation;
        }

        .topic-tag:active {
            background: #2a2a3a;
            border-color: #7c3aed;
            color: #e0e0e0;
        }

        .btn-primary {
            width: 100%;
            background: #7c3aed;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            margin-bottom: 12px;
        }

        .btn-primary:active {
            background: #6d28d9;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            width: 100%;
            background: #2a2a3a;
            color: #e0e0e0;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .btn-secondary:active {
            background: #3a3a4a;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3a;
            background: #1e1e2e;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            padding: 8px;
            margin: -8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .header-text {
            flex: 1;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: #e0e0e0;
        }

        .chat-header p {
            font-size: 12px;
            color: #7c7f9a;
            margin-top: 4px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #a0a0c0;
        }

        .message-icon {
            width: 16px;
            height: 16px;
        }

        .message-content {
            background: #181926;
            padding: 14px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
            border-left: 2px solid #7c3aed;
            color: #d0d0e0;
        }

        .user-message .message-content {
            border-left-color: #4a4a6a;
            background: #15161e;
        }

        .input-area {
            padding: 12px 16px 20px;
            border-top: 1px solid #2a2a3a;
            background: #1e1e2e;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper input {
            flex: 1;
            background: #181926;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 14px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-family: inherit;
            touch-action: manipulation;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .input-wrapper input:disabled {
            opacity: 0.4;
        }

        .send-btn {
            background: #2a2a3a;
            border: none;
            padding: 14px;
            border-radius: 30px;
            cursor: pointer;
            color: #a0a0c0;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            aspect-ratio: 1;
        }

        .send-btn:active:not(:disabled) {
            background: #7c3aed;
            color: white;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .status-bar {
            padding: 8px 20px;
            background: #15161e;
            border-top: 1px solid #2a2a3a;
            font-size: 12px;
            color: #7c7f9a;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .share-btn {
            background: none;
            border: none;
            color: #7c7f9a;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 20px;
            transition: all 0.15s;
        }

        .share-btn:active {
            background: #2a2a3a;
            color: #e0e0e0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4ade80;
        }

        .status-dot.waiting {
            background-color: #f97316;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a4a;
            border-radius: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7c7f9a;
        }

        @media (min-width: 768px) {
            .menu-btn {
                display: none;
            }
            
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 260px;
                box-shadow: none;
            }
            
            .overlay {
                display: none !important;
            }
            
            .chat-header {
                padding: 20px 32px;
            }
            
            .messages {
                padding: 24px 32px;
            }
            
            .input-area {
                padding: 20px 32px 28px;
            }
            
            .status-bar {
                padding: 8px 32px;
            }
        }

        @media (max-width: 480px) {
            .topic-tag {
                padding: 8px 14px;
                font-size: 13px;
            }
            
            .message-content {
                font-size: 14px;
                padding: 12px 14px;
            }
            
            .chat-header h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="overlay" id="overlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">ХАРАКТЕРИСТИКИ</div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-name">💪 Сила</span>
                        <span class="stat-value" id="strengthValue">5</span>
                    </div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="strengthBar" style="width: 50%;"></div></div>
                </div>
                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-name">✨ Харизма</span>
                        <span class="stat-value" id="charismaValue">5</span>
                    </div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="charismaBar" style="width: 50%;"></div></div>
                </div>
                <div class="stat-item">
                    <div class="stat-header">
                        <span class="stat-name">🧠 Интеллект</span>
                        <span class="stat-value" id="intellectValue">5</span>
                    </div>
                    <div class="stat-bar-bg"><div class="stat-bar-fill" id="intellectBar" style="width: 50%;"></div></div>
                </div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">📦 ИНВЕНТАРЬ</div>
            <div class="inventory-list" id="inventoryList">
                <div class="empty-inventory">Пусто</div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">ЦЕЛИ И СОСТОЯНИЕ</div>
            <div class="progress-item">
                <div class="progress-label"><span>🔍 Улики</span><span id="cluesCount">0</span><span>/<span id="maxClues">3</span></span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill" id="cluesBar" style="width: 0%;"></div></div>
            </div>
            <div class="progress-item">
                <div class="progress-label"><span>🧠 Рассудок</span><span id="sanityValue">100</span><span>%</span></div>
                <div class="progress-bar-bg"><div class="progress-bar-fill sanity" id="sanityBar" style="width: 100%;"></div></div>
            </div>
            <div class="sidebar-title" style="margin-top: 20px;">НОВАЯ ИСТОРИЯ</div>
            <input type="text" id="topicInput" class="topic-input" placeholder="например: нуар-детектив в 80-х">
            <div class="topics-grid">
                <span class="topic-tag" data-topic="Психологический хоррор">Хоррор</span>
                <span class="topic-tag" data-topic="Киберпанк-детектив">Киберпанк</span>
                <span class="topic-tag" data-topic="Фэнтези про тёмного мага">Фэнтези</span>
                <span class="topic-tag" data-topic="Космическая опера">Космос</span>
                <span class="topic-tag" data-topic="Викторианский детектив">Детектив</span>
                <span class="topic-tag" data-topic="Постапокалипсис">Постап</span>
            </div>
            <button class="btn-primary" id="startBtn">
                <i data-lucide="play" style="width: 18px; height: 18px;"></i>
                Начать игру
            </button>
            <button class="btn-secondary" id="saveGameBtn">
                <i data-lucide="save" style="width: 16px; height: 16px;"></i>
                Сохранить игру
            </button>
            <button class="btn-secondary" id="loadGameBtn">
                <i data-lucide="folder-open" style="width: 16px; height: 16px;"></i>
                Загрузить сохранение
            </button>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn">
                <i data-lucide="menu" style="width: 24px; height: 24px;"></i>
            </button>
            <div class="header-text">
                <h1 id="gameTitle">Dark Script</h1>
                <p id="gameSubtitle">выберите тему и начните приключение</p>
            </div>
        </div>

        <div class="messages" id="messagesContainer">
            <div class="empty-state">
                <i data-lucide="book-open" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                <p>Нет активной игры</p>
                <p style="font-size: 12px; margin-top: 8px;">выберите тему в меню ☰</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="ваше действие..." disabled>
                <button class="send-btn" id="sendBtn" disabled>
                    <i data-lucide="send" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-left">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">готов</span>
            </div>
            <button class="share-btn" id="shareBtn">
                <i data-lucide="share-2" style="width: 14px; height: 14px;"></i>
                Поделиться
            </button>
        </div>
    </div>
</div>

<script>
    // ==================== КОНФИГУРАЦИЯ ====================
    const API_KEY = 'AQVNzdc2nFo6euhGYkqoPz8XvR0XmerRbsfGw4_j';
    const MAX_CLUES = 3;
    const MAX_STAT = 10;
    const MIN_STAT = 0;
    
    // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
    let currentTopic = '';
    let messagesHistory = [];
    let isWaiting = false;
    let gameActive = true;
    let gameStarted = false;
    
    // Прогресс
    let clues = 0;
    let sanity = 100;
    
    // Характеристики (0-10)
    let strength = 5;
    let charisma = 5;
    let intellect = 5;
    
    // Инвентарь: каждый предмет имеет имя и эффект
    let inventory = [];
    
    // Концовки
    let endingTriggered = false;
    let currentEnding = null;
    
    // ==================== DOM ЭЛЕМЕНТЫ ====================
    const cluesSpan = document.getElementById('cluesCount');
    const cluesBar = document.getElementById('cluesBar');
    const sanitySpan = document.getElementById('sanityValue');
    const sanityBar = document.getElementById('sanityBar');
    const strengthSpan = document.getElementById('strengthValue');
    const strengthBar = document.getElementById('strengthBar');
    const charismaSpan = document.getElementById('charismaValue');
    const charismaBar = document.getElementById('charismaBar');
    const intellectSpan = document.getElementById('intellectValue');
    const intellectBar = document.getElementById('intellectBar');
    const inventoryDiv = document.getElementById('inventoryList');
    
    // ==================== ФУНКЦИИ ОБНОВЛЕНИЯ UI ====================
    function updateProgressUI() {
        cluesSpan.innerText = clues;
        cluesBar.style.width = (clues / MAX_CLUES) * 100 + '%';
        sanitySpan.innerText = sanity;
        sanityBar.style.width = sanity + '%';
    }
    
    function updateStatsUI() {
        strengthSpan.innerText = strength;
        strengthBar.style.width = (strength / MAX_STAT) * 100 + '%';
        charismaSpan.innerText = charisma;
        charismaBar.style.width = (charisma / MAX_STAT) * 100 + '%';
        intellectSpan.innerText = intellect;
        intellectBar.style.width = (intellect / MAX_STAT) * 100 + '%';
    }
    
    function updateInventoryUI() {
        if (!inventoryDiv) return;
        inventoryDiv.innerHTML = '';
        if (inventory.length === 0) {
            inventoryDiv.innerHTML = '<div class="empty-inventory">Пусто</div>';
            return;
        }
        inventory.forEach((item, idx) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'inventory-item';
            itemDiv.innerHTML = `
                <div class="inventory-item-name">
                    <span>📦</span> ${escapeHtml(item.name)}
                </div>
                <div class="inventory-item-effect">${escapeHtml(item.effect || '')}</div>
            `;
            inventoryDiv.appendChild(itemDiv);
        });
    }
    
    // ==================== ПАРСИНГ ПРОГРЕССА ИЗ ТЕКСТА ИИ ====================
    function parseProgressFromText(text) {
        let newClues = null;
        let newSanity = null;
        let newStrength = null;
        let newCharisma = null;
        let newIntellect = null;
        let newInventory = null;
        let newEnding = null;
        
        const cluesMatch = text.match(/Улики:\s*(\d+)\s*\/\s*(\d+)/i);
        if (cluesMatch) newClues = parseInt(cluesMatch[1]);
        
        const sanityMatch = text.match(/Рассудок:\s*(\d+)%/i);
        if (sanityMatch) newSanity = parseInt(sanityMatch[1]);
        
        const strengthMatch = text.match(/Сила:\s*(\d+)\s*\/\s*(\d+)/i);
        if (strengthMatch) newStrength = parseInt(strengthMatch[1]);
        
        const charismaMatch = text.match(/Харизма:\s*(\d+)\s*\/\s*(\d+)/i);
        if (charismaMatch) newCharisma = parseInt(charismaMatch[1]);
        
        const intellectMatch = text.match(/Интеллект:\s*(\d+)\s*\/\s*(\d+)/i);
        if (intellectMatch) newIntellect = parseInt(intellectMatch[1]);
        
        // Парсинг инвентаря: [Инвентарь: предмет1, предмет2]
        const inventoryMatch = text.match(/Инвентарь:\s*\[(.*?)\]/i);
        if (inventoryMatch) {
            const itemsStr = inventoryMatch[1];
            if (itemsStr.trim()) {
                newInventory = itemsStr.split(',').map(s => s.trim()).filter(s => s);
            } else {
                newInventory = [];
            }
        }
        
        // Парсинг концовки
        const endingMatch = text.match(/КОНЦОВКА:\s*(.+?)(?:\n|$)/i);
        if (endingMatch) newEnding = endingMatch[1];
        
        return { 
            clues: newClues, 
            sanity: newSanity,
            strength: newStrength,
            charisma: newCharisma,
            intellect: newIntellect,
            inventory: newInventory,
            ending: newEnding
        };
    }
    
    function addToInventory(itemName, effect = '') {
        if (!inventory.some(i => i.name === itemName)) {
            inventory.push({ name: itemName, effect: effect });
            updateInventoryUI();
            addMessage(`🎒 +${itemName} добавлен в инвентарь`, false);
        }
    }
    
    function applyProgress(progress) {
        if (!gameActive || endingTriggered) return;
        
        if (progress.clues !== null && progress.clues >= 0 && progress.clues <= MAX_CLUES) clues = progress.clues;
        if (progress.sanity !== null && progress.sanity >= 0 && progress.sanity <= 100) sanity = progress.sanity;
        if (progress.strength !== null && progress.strength >= MIN_STAT && progress.strength <= MAX_STAT) strength = progress.strength;
        if (progress.charisma !== null && progress.charisma >= MIN_STAT && progress.charisma <= MAX_STAT) charisma = progress.charisma;
        if (progress.intellect !== null && progress.intellect >= MIN_STAT && progress.intellect <= MAX_STAT) intellect = progress.intellect;
        
        if (progress.inventory !== null) {
            inventory = progress.inventory.map(name => ({ name: name, effect: '' }));
            updateInventoryUI();
        }
        
        updateProgressUI();
        updateStatsUI();
        
        // Проверка концовок (победа/поражение/особые)
        if (progress.ending) {
            triggerEnding(progress.ending);
            return;
        }
        
        if (clues >= MAX_CLUES && !endingTriggered) {
            triggerEnding('Вы собрали все улики и раскрыли тайну! Поздравляю с победой!');
        } else if (sanity <= 0 && !endingTriggered) {
            triggerEnding('Ваш рассудок не выдержал ужасов... Игра окончена.');
        }
    }
    
    function triggerEnding(endingText) {
        if (endingTriggered) return;
        endingTriggered = true;
        gameActive = false;
        currentEnding = endingText;
        
        addMessage('🎭 КОНЦОВКА', false);
        addMessage(endingText, false);
        addMessage('Игра завершена. Начните новую игру, чтобы продолжить.', false);
        
        document.getElementById('userInput').disabled = true;
        document.getElementById('sendBtn').disabled = true;
        setStatus("финал", false);
    }
    
    // ==================== СОХРАНЕНИЕ / ЗАГРУЗКА ====================
    function saveGame() {
        if (!gameStarted) {
            addMessage('Нечего сохранять — игра ещё не начата', false);
            return;
        }
        
        const saveData = {
            version: '1.0',
            timestamp: Date.now(),
            currentTopic,
            messagesHistory,
            gameActive,
            gameStarted,
            clues,
            sanity,
            strength,
            charisma,
            intellect,
            inventory,
            endingTriggered,
            currentEnding
        };
        
        localStorage.setItem('darkScriptSave', JSON.stringify(saveData));
        addMessage('💾 Игра сохранена!', false);
        setStatus("сохранено", false);
        setTimeout(() => {
            if (gameActive && !isWaiting) setStatus("ваш ход", false);
        }, 1500);
    }
    
    function loadGame() {
        const saved = localStorage.getItem('darkScriptSave');
        if (!saved) {
            addMessage('Нет сохранённой игры', false);
            return;
        }
        
        try {
            const data = JSON.parse(saved);
            
            currentTopic = data.currentTopic;
            messagesHistory = data.messagesHistory || [];
            gameActive = data.gameActive;
            gameStarted = data.gameStarted;
            clues = data.clues;
            sanity = data.sanity;
            strength = data.strength;
            charisma = data.charisma;
            intellect = data.intellect;
            inventory = data.inventory || [];
            endingTriggered = data.endingTriggered || false;
            currentEnding = data.currentEnding || null;
            
            updateProgressUI();
            updateStatsUI();
            updateInventoryUI();
            
            // Восстанавливаем чат
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            for (const msg of messagesHistory) {
                addMessage(msg.text, msg.isUser);
            }
            
            if (!gameStarted || !messagesHistory.length) {
                container.innerHTML = '<div class="empty-state"><i data-lucide="book-open" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i><p>Загружена пустая игра. Начните новую.</p></div>';
                lucide.createIcons();
            }
            
            document.getElementById('gameTitle').innerText = currentTopic.length > 35 ? currentTopic.slice(0, 35) + '…' : (currentTopic || 'Dark Script');
            document.getElementById('gameSubtitle').innerText = currentTopic ? `жанр: ${currentTopic}` : "выберите тему и начните приключение";
            
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            
            if (gameActive && gameStarted && !endingTriggered) {
                userInput.disabled = false;
                sendBtn.disabled = false;
                setStatus("ваш ход", false);
            } else if (endingTriggered) {
                userInput.disabled = true;
                sendBtn.disabled = true;
                setStatus("финал", false);
            } else {
                userInput.disabled = true;
                sendBtn.disabled = true;
                setStatus("нет игры", false);
            }
            
            addMessage('📀 Загрузка завершена!', false);
            lucide.createIcons();
            
            if (window.innerWidth < 768) closeMenu();
        } catch(e) {
            console.error('Ошибка загрузки:', e);
            addMessage('Ошибка загрузки сохранения', false);
        }
    }
    
    // ==================== ЭКСПОРТ ИСТОРИИ ====================
    function shareHistory() {
        if (messagesHistory.length === 0) {
            addMessage('Нет истории для экспорта', false);
            return;
        }
        
        let exportText = `Dark Script — ${currentTopic}\n`;
        exportText += `Дата: ${new Date().toLocaleString()}\n`;
        exportText += `Результат: улик ${clues}/${MAX_CLUES}, рассудок ${sanity}%\n`;
        exportText += `Характеристики: сила ${strength}, харизма ${charisma}, интеллект ${intellect}\n`;
        exportText += `Инвентарь: ${inventory.map(i => i.name).join(', ') || 'пусто'}\n`;
        exportText += `\n=== ИСТОРИЯ ===\n\n`;
        
        for (const msg of messagesHistory) {
            const prefix = msg.isUser ? '> Вы: ' : 'Мастер: ';
            exportText += prefix + msg.text + '\n\n';
        }
        
        if (currentEnding) {
            exportText += `\n=== КОНЦОВКА ===\n${currentEnding}\n`;
        }
        
        const blob = new Blob([exportText], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `dark_script_${Date.now()}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        
        addMessage('📤 История экспортирована в файл', false);
    }
    
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function addMessage(text, isUser) {
        const container = document.getElementById('messagesContainer');
        const empty = container.querySelector('.empty-state');
        if (empty) empty.remove();
        
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
        const iconName = isUser ? 'user' : 'bot';
        const sender = isUser ? 'Вы' : 'Мастер истории';
        
        messageDiv.innerHTML = `
            <div class="message-meta">
                <i data-lucide="${iconName}" class="message-icon"></i>
                <span>${sender}</span>
            </div>
            <div class="message-content">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
        `;
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
        lucide.createIcons();
    }
    
    function setStatus(text, isWaitingStatus = false) {
        const statusText = document.getElementById('statusText');
        const dot = document.getElementById('statusDot');
        statusText.innerText = text;
        if (isWaitingStatus) {
            dot.classList.add('waiting');
        } else {
            dot.classList.remove('waiting');
        }
    }
    
    // ==================== YANDEX GPT API ====================
    async function callYandexGPT(userMessage, isFirstMessage = false) {
        let systemText;
        if (isFirstMessage) {
            systemText = `Ты — мастер повествования в жанре "${currentTopic}". 
ИГРОВАЯ СИСТЕМА:
- Характеристики: Сила (0-10), Харизма (0-10), Интеллект (0-10). Начальные значения: 5/10.
- Инвентарь: предметы, которые помогают в игре.
- Улики: нужно собрать ${MAX_CLUES}.
- Рассудок: 0-100%.

ПРАВИЛА ОБНОВЛЕНИЙ:
В конце каждого ответа ОБЯЗАТЕЛЬНО указывай прогресс в формате:
"Улики: X/3. Рассудок: Y%. Сила: Z/10. Харизма: A/10. Интеллект: B/10. Инвентарь: [предмет1, предмет2]"

ЕСЛИ ИГРОК ДОСТИГ ПОБЕДЫ (3 улики) — напиши "КОНЦОВКА: текст победы"
ЕСЛИ РАССУДОК ПАДАЕТ ДО 0 — напиши "КОНЦОВКА: текст поражения"

Правила изменения:
- Сила растёт от физических действий, падает от травм.
- Харизма растёт от убеждения, падает от грубости.
- Интеллект растёт от разгадывания загадок, падает от глупых решений.
- Предметы добавляй в инвентарь, когда игрок их находит.

Первым сообщением опиши место, загадку и задай вопрос "Что ты делаешь?". Укажи начальный прогресс.`;
        } else {
            systemText = `Ты — мастер повествования в жанре "${currentTopic}". 
ТЕКУЩЕЕ СОСТОЯНИЕ:
Улики: ${clues}/${MAX_CLUES}
Рассудок: ${sanity}%
Сила: ${strength}/10, Харизма: ${charisma}/10, Интеллект: ${intellect}/10
Инвентарь: [${inventory.map(i => i.name).join(', ')}]

ОТВЕЧАЙ НА ДЕЙСТВИЕ ИГРОКА. В конце каждого ответа обязательно указывай новый прогресс в формате выше.
Если нужно добавить предмет в инвентарь — укажи его в формате "Инвентарь: [предмет]".
Если игрок заслуживает победу или поражение — напиши "КОНЦОВКА: текст"`;
        }
        
        let messages = [{ role: "system", text: systemText }];
        const lastMessages = messagesHistory.slice(-10);
        for (let msg of lastMessages) {
            messages.push({ role: msg.isUser ? "user" : "assistant", text: msg.text });
        }
        messages.push({ role: "user", text: userMessage });
        
        try {
            const response = await fetch("https://yandex-proxy-1-xzf2.onrender.com/api/gpt", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages })
            });
            
            const data = await response.json();
            console.log('Ответ от прокси:', data);
            
            if (data.error) {
                return `Ошибка прокси: ${data.error}`;
            }
            
            if (data.result && data.result.alternatives && data.result.alternatives[0]) {
                return data.result.alternatives[0].message.text;
            } else if (data.alternatives && data.alternatives[0]) {
                return data.alternatives[0].message.text;
            } else {
                return `Неожиданный ответ: ${JSON.stringify(data)}`;
            }
        } catch(e) {
            console.error('Ошибка запроса:', e);
            return `Ошибка соединения: ${e.message}`;
        }
    }
    
    // ==================== ИГРОВЫЕ ФУНКЦИИ ====================
    async function startGame() {
        if (isWaiting) return;
        
        let topic = document.getElementById('topicInput').value.trim();
        if (!topic) topic = "таинственное приключение";
        currentTopic = topic;
        messagesHistory = [];
        
        // Сброс всего состояния
        clues = 0;
        sanity = 100;
        strength = 5;
        charisma = 5;
        intellect = 5;
        inventory = [];
        gameActive = true;
        gameStarted = true;
        endingTriggered = false;
        currentEnding = null;
        
        updateProgressUI();
        updateStatsUI();
        updateInventoryUI();
        
        document.getElementById('messagesContainer').innerHTML = '';
        document.getElementById('gameTitle').innerText = topic.length > 35 ? topic.slice(0, 35) + '…' : topic;
        document.getElementById('gameSubtitle').innerText = `жанр: ${topic}`;
        
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        userInput.disabled = false;
        sendBtn.disabled = false;
        
        isWaiting = true;
        setStatus("ИИ создаёт мир...", true);
        
        const firstScene = await callYandexGPT(
            "Создай детальное, атмосферное начало игры с учётом системы характеристик и инвентаря. Опиши окружение, настроение, загадку. Введи игрока в ситуацию. Закончи вопросом 'Что ты делаешь?'",
            true
        );
        
        addMessage(firstScene, false);
        messagesHistory.push({ text: firstScene, isUser: false });
        
        const progress = parseProgressFromText(firstScene);
        applyProgress(progress);
        
        isWaiting = false;
        if (gameActive) setStatus("ваш ход", false);
        userInput.focus();
        
        if (window.innerWidth < 768) closeMenu();
    }
    
    async function sendMessage() {
        if (isWaiting || !gameActive || !gameStarted || endingTriggered) return;
        
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;
        
        addMessage(text, true);
        messagesHistory.push({ text: text, isUser: true });
        input.value = '';
        
        isWaiting = true;
        setStatus("история продолжается...", true);
        
        const reply = await callYandexGPT(text, false);
        addMessage(reply, false);
        messagesHistory.push({ text: reply, isUser: false });
        
        const progress = parseProgressFromText(reply);
        applyProgress(progress);
        
        isWaiting = false;
        if (gameActive && !endingTriggered) setStatus("ваш ход", false);
        input.focus();
    }
    
    // ==================== МОБИЛЬНОЕ МЕНЮ ====================
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');
    
    function closeMenu() {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    }
    
    function openMenu() {
        sidebar.classList.add('open');
        overlay.classList.add('active');
    }
    
    if (menuBtn) {
        menuBtn.addEventListener('click', openMenu);
    }
    
    if (overlay) {
        overlay.addEventListener('click', closeMenu);
    }
    
    document.querySelectorAll('.topic-tag').forEach(tag => {
        tag.addEventListener('click', () => {
            document.getElementById('topicInput').value = tag.getAttribute('data-topic');
            if (window.innerWidth < 768) closeMenu();
        });
    });
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('saveGameBtn').addEventListener('click', saveGame);
    document.getElementById('loadGameBtn').addEventListener('click', loadGame);
    document.getElementById('shareBtn').addEventListener('click', shareHistory);
    
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled && !isWaiting && gameActive && gameStarted && !endingTriggered) {
            sendMessage();
        }
    });
    
    lucide.createIcons();
    
    // Автосохранение при закрытии страницы (опционально)
    window.addEventListener('beforeunload', () => {
        if (gameStarted && messagesHistory.length > 0) {
            saveGame();
        }
    });
</script>
