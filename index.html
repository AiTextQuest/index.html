<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dark Script — игра с ИИ</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1e1e2e;
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* Основной контейнер */
        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Боковая панель — по умолчанию скрыта на мобилках */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background-color: #15161e;
            border-right: 1px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 0;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        /* Панель открыта */
        .sidebar.open {
            transform: translateX(0);
        }

        /* Затемнение фона при открытом меню */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .sidebar-section {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid #2a2a3a;
        }

        .sidebar-section:last-child {
            border-bottom: none;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7c7f9a;
            margin-bottom: 16px;
        }

        .topic-input {
            width: 100%;
            background: #1a1b26;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 16px;
        }

        .topic-input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .topics-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .topic-tag {
            background: #1a1b26;
            border: 1px solid #2a2a3a;
            color: #a0a0c0;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s ease;
            touch-action: manipulation;
        }

        .topic-tag:active {
            background: #2a2a3a;
            border-color: #7c3aed;
            color: #e0e0e0;
        }

        .btn-primary {
            width: 100%;
            background: #7c3aed;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
        }

        .btn-primary:active {
            background: #6d28d9;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Основная область */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 100%;
        }

        /* Шапка чата с кнопкой меню */
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a3a;
            background: #1e1e2e;
            display: flex;
            align-items: baseline;
            gap: 12px;
            flex-wrap: wrap;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            padding: 8px;
            margin: -8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .menu-btn:active {
            opacity: 0.7;
        }

        .header-text {
            flex: 1;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: #e0e0e0;
        }

        .chat-header p {
            font-size: 12px;
            color: #7c7f9a;
            margin-top: 4px;
        }

        /* Сообщения */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 20px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 500;
            color: #a0a0c0;
        }

        .message-icon {
            width: 16px;
            height: 16px;
        }

        .message-content {
            background: #181926;
            padding: 14px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 15px;
            border-left: 2px solid #7c3aed;
            color: #d0d0e0;
        }

        .user-message .message-content {
            border-left-color: #4a4a6a;
            background: #15161e;
        }

        /* Поле ввода */
        .input-area {
            padding: 12px 16px 20px;
            border-top: 1px solid #2a2a3a;
            background: #1e1e2e;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper input {
            flex: 1;
            background: #181926;
            border: 1px solid #2a2a3a;
            color: #e0e0e0;
            padding: 14px 16px;
            border-radius: 30px;
            font-size: 16px;
            font-family: inherit;
            touch-action: manipulation;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        .input-wrapper input:disabled {
            opacity: 0.4;
        }

        .send-btn {
            background: #2a2a3a;
            border: none;
            padding: 14px;
            border-radius: 30px;
            cursor: pointer;
            color: #a0a0c0;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            aspect-ratio: 1;
        }

        .send-btn:active:not(:disabled) {
            background: #7c3aed;
            color: white;
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Статус бар */
        .status-bar {
            padding: 8px 20px;
            background: #15161e;
            border-top: 1px solid #2a2a3a;
            font-size: 12px;
            color: #7c7f9a;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #4ade80;
        }

        .status-dot.waiting {
            background-color: #f97316;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Скролл */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a4a;
            border-radius: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #7c7f9a;
        }

        /* Планшеты и десктопы — показываем панель всегда */
        @media (min-width: 768px) {
            .menu-btn {
                display: none;
            }
            
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 260px;
                box-shadow: none;
            }
            
            .overlay {
                display: none !important;
            }
            
            .chat-header {
                padding: 20px 32px;
            }
            
            .messages {
                padding: 24px 32px;
            }
            
            .input-area {
                padding: 20px 32px 28px;
            }
            
            .status-bar {
                padding: 8px 32px;
            }
        }

        /* Маленькие телефоны */
        @media (max-width: 480px) {
            .topic-tag {
                padding: 8px 14px;
                font-size: 13px;
            }
            
            .message-content {
                font-size: 14px;
                padding: 12px 14px;
            }
            
            .chat-header h1 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Затемнение -->
    <div class="overlay" id="overlay"></div>
    
    <!-- Боковая панель -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">Новая история</div>
            <input type="text" id="topicInput" class="topic-input" placeholder="например: нуар-детектив в 80-х">
            <div class="topics-grid">
                <span class="topic-tag" data-topic="Психологический хоррор">Хоррор</span>
                <span class="topic-tag" data-topic="Киберпанк-детектив">Киберпанк</span>
                <span class="topic-tag" data-topic="Фэнтези про тёмного мага">Фэнтези</span>
                <span class="topic-tag" data-topic="Космическая опера">Космос</span>
                <span class="topic-tag" data-topic="Викторианский детектив">Детектив</span>
                <span class="topic-tag" data-topic="Постапокалипсис">Постап</span>
            </div>
            <button class="btn-primary" id="startBtn">
                <i data-lucide="play" style="width: 18px; height: 18px;"></i>
                Начать игру
            </button>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn">
                <i data-lucide="menu" style="width: 24px; height: 24px;"></i>
            </button>
            <div class="header-text">
                <h1 id="gameTitle">Dark Script</h1>
                <p id="gameSubtitle">выберите тему и начните приключение</p>
            </div>
        </div>

        <div class="messages" id="messagesContainer">
            <div class="empty-state">
                <i data-lucide="book-open" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5;"></i>
                <p>Нет активной игры</p>
                <p style="font-size: 12px; margin-top: 8px;">выберите тему в меню ☰</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="ваше действие..." disabled>
                <button class="send-btn" id="sendBtn" disabled>
                    <i data-lucide="send" style="width: 20px; height: 20px;"></i>
                </button>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">готов</span>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AQVNzdc2nFo6euhGYkqoPz8XvR0XmerRbsfGw4_j';
    let currentTopic = '';
    let messagesHistory = [];
    let isWaiting = false;

    lucide.createIcons();

    function updateIcons() {
        lucide.createIcons();
    }

    // Мобильное меню
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');

    function closeMenu() {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    }

    function openMenu() {
        sidebar.classList.add('open');
        overlay.classList.add('active');
    }

    if (menuBtn) {
        menuBtn.addEventListener('click', openMenu);
    }
    
    overlay.addEventListener('click', closeMenu);

    document.querySelectorAll('.topic-tag').forEach(tag => {
        tag.addEventListener('click', () => {
            document.getElementById('topicInput').value = tag.getAttribute('data-topic');
            if (window.innerWidth < 768) closeMenu();
        });
    });

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function addMessage(text, isUser) {
        const container = document.getElementById('messagesContainer');
        const empty = container.querySelector('.empty-state');
        if (empty) empty.remove();

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
        const iconName = isUser ? 'user' : 'bot';
        const sender = isUser ? 'Вы' : 'Мастер истории';
        
        messageDiv.innerHTML = `
            <div class="message-meta">
                <i data-lucide="${iconName}" class="message-icon"></i>
                <span>${sender}</span>
            </div>
            <div class="message-content">${escapeHtml(text).replace(/\n/g, '<br>')}</div>
        `;
        container.appendChild(messageDiv);
        container.scrollTop = container.scrollHeight;
        updateIcons();
    }

    function setStatus(text, isWaitingStatus = false) {
        const statusText = document.getElementById('statusText');
        const dot = document.getElementById('statusDot');
        statusText.innerText = text;
        if (isWaitingStatus) {
            dot.classList.add('waiting');
        } else {
            dot.classList.remove('waiting');
        }
    }

    async function callYandexGPT(userMessage, isFirstMessage = false) {
        let systemText;
        if (isFirstMessage) {
            systemText = `Ты — мастер повествования в жанре "${currentTopic}". Напиши 4-6 предложений. Опиши время суток, погоду, звуки, освещение. Введи загадку. Закончи вопросом "Что ты делаешь?"`;
        } else {
            systemText = `Ты — мастер повествования в жанре "${currentTopic}". Продолжай историю, опираясь на прошлое. Не меняй жанр. Каждый ответ заканчивай вопросом "Что ты делаешь?". Отвечай кратко: 2-4 предложения.`;
        }
        
        let messages = [{ role: "system", text: systemText }];
        const lastMessages = messagesHistory.slice(-10);
        for (let msg of lastMessages) {
            messages.push({ role: msg.isUser ? "user" : "assistant", text: msg.text });
        }
        messages.push({ role: "user", text: userMessage });

        try {
            const response = await fetch("https://yandex-proxy-1-xzf2.onrender.com/api/gpt", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ messages })
            });
            
            const data = await response.json();
            
            console.log('Ответ от прокси:', data);
            
            if (data.error) {
                return `Ошибка прокси: ${data.error}`;
            }
            
            if (data.result && data.result.alternatives && data.result.alternatives[0]) {
                return data.result.alternatives[0].message.text;
            } else if (data.alternatives && data.alternatives[0]) {
                return data.alternatives[0].message.text;
            } else {
                return `Неожиданный ответ: ${JSON.stringify(data)}`;
            }
        } catch(e) {
            console.error('Ошибка запроса:', e);
            return `Ошибка соединения: ${e.message}`;
        }
    }

    async function startGame() {
        if (isWaiting) return;

        let topic = document.getElementById('topicInput').value.trim();
        if (!topic) topic = "таинственное приключение";
        currentTopic = topic;
        messagesHistory = [];

        document.getElementById('messagesContainer').innerHTML = '';
        document.getElementById('gameTitle').innerText = topic.length > 35 ? topic.slice(0, 35) + '…' : topic;
        document.getElementById('gameSubtitle').innerText = `жанр: ${topic}`;

        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        userInput.disabled = false;
        sendBtn.disabled = false;

        isWaiting = true;
        setStatus("ИИ создаёт мир...", true);

        const firstScene = await callYandexGPT(
            "Создай максимально детальное, атмосферное начало игры. Опиши окружение, настроение, загадку или тайну. Введи игрока в ситуацию. Закончи вопросом 'Что ты делаешь?'",
            true
        );
        
        addMessage(firstScene, false);
        messagesHistory.push({ text: firstScene, isUser: false });

        isWaiting = false;
        setStatus("ваш ход", false);
        userInput.focus();
        
        if (window.innerWidth < 768) closeMenu();
    }

    async function sendMessage() {
        if (isWaiting) return;

        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, true);
        messagesHistory.push({ text: text, isUser: true });
        input.value = '';

        isWaiting = true;
        setStatus("история продолжается...", true);

        const reply = await callYandexGPT(text, false);
        addMessage(reply, false);
        messagesHistory.push({ text: reply, isUser: false });

        isWaiting = false;
        setStatus("ваш ход", false);
        input.focus();
    }

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !document.getElementById('sendBtn').disabled && !isWaiting) {
            sendMessage();
        }
    });
</script>
</body>
</html>
