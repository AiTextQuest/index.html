<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Dark Script — Живой мир</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #14141f 100%);
            color: #e0e0e0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* Боковая панель - обновленный дизайн */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(124, 58, 237, 0.3);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 20px 0;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 999;
            display: none;
        }

        .overlay.active {
            display: block;
        }

        .sidebar-section {
            padding: 0 20px 20px 20px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.2);
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7c3aed;
            margin-bottom: 16px;
        }

        /* Анимированные характеристики */
        .stat-item {
            background: rgba(20, 20, 30, 0.8);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(124, 58, 237, 0.3);
            transition: all 0.2s;
        }

        .stat-item:active {
            transform: scale(0.98);
            background: rgba(124, 58, 237, 0.1);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-value {
            color: #7c3aed;
            font-weight: 700;
        }

        .stat-bar-bg {
            background: rgba(30, 30, 40, 0.8);
            border-radius: 8px;
            height: 6px;
            overflow: hidden;
        }

        .stat-bar-fill {
            background: linear-gradient(90deg, #7c3aed, #a78bfa);
            width: 0%;
            height: 100%;
            border-radius: 8px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Инвентарь */
        .inventory-item {
            background: rgba(20, 20, 30, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 2px solid #7c3aed;
        }

        /* Отношения с фракциями */
        .faction-item {
            background: rgba(20, 20, 30, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .faction-header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
        }

        .faction-bar {
            background: rgba(30, 30, 40, 0.8);
            border-radius: 4px;
            height: 3px;
        }

        .faction-fill {
            background: #f97316;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 12px;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            width: 100%;
            background: rgba(30, 30, 40, 0.8);
            color: #e0e0e0;
            border: 1px solid rgba(124, 58, 237, 0.3);
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        /* Основная область */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(124, 58, 237, 0.3);
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
        }

        .menu-btn {
            background: none;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            padding: 8px;
            margin-right: 12px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.9), rgba(15, 15, 25, 0.9));
            padding: 14px 18px;
            border-radius: 16px;
            border-left: 3px solid #7c3aed;
            line-height: 1.6;
            font-size: 15px;
        }

        .user-message .message-content {
            border-left-color: #f97316;
            background: rgba(30, 30, 40, 0.9);
        }

        /* Кнопки выбора */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 8px;
        }

        .choice-btn {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(124, 58, 237, 0.4);
            padding: 14px 18px;
            border-radius: 14px;
            color: #e0e0e0;
            font-size: 14px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .choice-btn:active {
            transform: scale(0.98);
            background: rgba(124, 58, 237, 0.2);
            border-color: #7c3aed;
        }

        .choice-chance {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 20px;
            background: rgba(0,0,0,0.5);
        }

        .chance-high { color: #4ade80; }
        .chance-medium { color: #fbbf24; }
        .chance-low { color: #f87171; }

        /* Анимация куба */
        @keyframes diceRoll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dice-animation {
            display: inline-block;
            animation: diceRoll 0.5s ease-out;
        }

        .status-bar {
            padding: 12px 20px;
            background: rgba(10, 10, 15, 0.9);
            border-top: 1px solid rgba(124, 58, 237, 0.3);
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }

        @media (min-width: 768px) {
            .menu-btn { display: none; }
            .sidebar {
                position: relative;
                transform: translateX(0);
                backdrop-filter: none;
            }
            .overlay { display: none !important; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="overlay" id="overlay"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">ХАРАКТЕРИСТИКИ</div>
            <div class="stat-item">
                <div class="stat-header"><span>💪 СИЛА</span><span id="strengthValue">5</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="strengthBar" style="width: 50%;"></div></div>
            </div>
            <div class="stat-item">
                <div class="stat-header"><span>✨ ХАРИЗМА</span><span id="charismaValue">5</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="charismaBar" style="width: 50%;"></div></div>
            </div>
            <div class="stat-item">
                <div class="stat-header"><span>🧠 ИНТЕЛЛЕКТ</span><span id="intellectValue">5</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="intellectBar" style="width: 50%;"></div></div>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">🤝 ОТНОШЕНИЯ</div>
            <div id="factionsList"></div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">📦 ИНВЕНТАРЬ</div>
            <div id="inventoryList"></div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">🎯 СОСТОЯНИЕ</div>
            <div class="stat-item">
                <div class="stat-header"><span>🔍 УЛИКИ</span><span id="cluesCount">0/3</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="cluesBar" style="width: 0%;"></div></div>
            </div>
            <div class="stat-item">
                <div class="stat-header"><span>🧠 РАССУДОК</span><span id="sanityValue">100%</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="sanityBar" style="width: 100%; background: #f97316;"></div></div>
            </div>
            <div class="stat-item">
                <div class="stat-header"><span>⚠️ НАПРЯЖЕНИЕ</span><span id="tensionValue">0%</span></div>
                <div class="stat-bar-bg"><div class="stat-bar-fill" id="tensionBar" style="width: 0%; background: #ef4444;"></div></div>
            </div>
        </div>

        <div class="sidebar-section">
            <button class="btn-primary" id="startBtn">🎲 НАЧАТЬ ИГРУ</button>
            <button class="btn-secondary" id="saveBtn">💾 СОХРАНИТЬ</button>
            <button class="btn-secondary" id="loadBtn">📀 ЗАГРУЗИТЬ</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn">☰</button>
            <h1 id="gameTitle">Dark Script</h1>
            <p style="font-size: 12px; opacity: 0.7;">живой мир · риск · последствия</p>
        </div>

        <div class="messages" id="messagesContainer">
            <div class="empty-state" style="text-align: center; padding: 60px 20px; opacity: 0.5;">
                <p>🎭 Нажмите «Начать игру»</p>
                <p style="font-size: 12px;">каждое решение имеет вес</p>
            </div>
        </div>

        <div class="status-bar">
            <span id="statusText">готов</span>
            <button id="shareBtn" style="background: none; border: none; color: #7c3aed; cursor: pointer;">📤 экспорт</button>
        </div>
    </div>
</div>

<script>
    // ==================== ИГРОВОЕ СОСТОЯНИЕ ====================
    let gameState = {
        // Прогресс
        clues: 0,
        sanity: 100,
        tension: 0,
        
        // Характеристики
        strength: 5,
        charisma: 5,
        intellect: 5,
        
        // Инвентарь и память
        inventory: [],
        memory: [], // Ключевые события
        factionReputation: {
            "Городская стража": 0,
            "Преступный мир": 0,
            "Таинственный орден": 0
        },
        
        // Сюжетные флаги
        storyFlags: {
            metCaptain: false,
            helpedThief: false,
            foundSecret: false
        },
        
        // Техническое
        gameActive: true,
        gameStarted: false,
        currentTopic: "",
        messagesHistory: [],
        turnCount: 0
    };
    
    let isWaiting = false;
    let currentChoices = [];
    
    // ==================== ОБНОВЛЕНИЕ UI ====================
    function updateUI() {
        // Характеристики
        document.getElementById('strengthValue').innerText = gameState.strength;
        document.getElementById('strengthBar').style.width = (gameState.strength / 10) * 100 + '%';
        document.getElementById('charismaValue').innerText = gameState.charisma;
        document.getElementById('charismaBar').style.width = (gameState.charisma / 10) * 100 + '%';
        document.getElementById('intellectValue').innerText = gameState.intellect;
        document.getElementById('intellectBar').style.width = (gameState.intellect / 10) * 100 + '%';
        
        // Прогресс
        document.getElementById('cluesCount').innerText = `${gameState.clues}/3`;
        document.getElementById('cluesBar').style.width = (gameState.clues / 3) * 100 + '%';
        document.getElementById('sanityValue').innerText = gameState.sanity + '%';
        document.getElementById('sanityBar').style.width = gameState.sanity + '%';
        document.getElementById('tensionValue').innerText = gameState.tension + '%';
        document.getElementById('tensionBar').style.width = gameState.tension + '%';
        
        // Инвентарь
        const invDiv = document.getElementById('inventoryList');
        if (gameState.inventory.length === 0) {
            invDiv.innerHTML = '<div style="color: #666; font-size: 12px;">Пусто</div>';
        } else {
            invDiv.innerHTML = gameState.inventory.map(item => 
                `<div class="inventory-item">📦 ${item}</div>`
            ).join('');
        }
        
        // Отношения с фракциями
        const factionsDiv = document.getElementById('factionsList');
        factionsDiv.innerHTML = Object.entries(gameState.factionReputation).map(([name, value]) => `
            <div class="faction-item">
                <div class="faction-header">
                    <span>${name}</span>
                    <span>${value > 0 ? '+' : ''}${value}</span>
                </div>
                <div class="faction-bar">
                    <div class="faction-fill" style="width: ${(value + 50) / 100 * 100}%;"></div>
                </div>
            </div>
        `).join('');
    }
    
    // ==================== СИСТЕМА РИСКА ====================
    function calculateChance(statValue, difficulty) {
        let baseChance = statValue * 10;
        if (difficulty === 'hard') baseChance -= 25;
        if (difficulty === 'easy') baseChance += 20;
        return Math.min(95, Math.max(5, baseChance));
    }
    
    async function resolveAction(choice) {
        const chance = calculateChance(choice.statValue, choice.difficulty);
        const roll = Math.random() * 100;
        const isSuccess = roll <= chance;
        const isCritical = isSuccess ? (roll <= chance * 0.2) : (roll >= 95);
        
        // Анимация куба
        const diceSpan = document.createElement('span');
        diceSpan.className = 'dice-animation';
        diceSpan.innerText = '🎲';
        document.getElementById('statusText').prepend(diceSpan);
        setTimeout(() => diceSpan.remove(), 500);
        
        let resultText = `${choice.text} [${chance}% шанс] → ${roll.toFixed(0)} → `;
        let resultType = '';
        let statChanges = {};
        
        if (isCritical && isSuccess) {
            resultText += 'КРИТИЧЕСКИЙ УСПЕХ! 🔥';
            resultType = 'critical_success';
            statChanges = choice.criticalSuccess || {};
            gameState.tension = Math.max(0, gameState.tension - 15);
        } else if (isSuccess) {
            resultText += 'УСПЕХ ✅';
            resultType = 'success';
            statChanges = choice.success || {};
            gameState.tension = Math.max(0, gameState.tension - 5);
        } else if (isCritical) {
            resultText += 'КРИТИЧЕСКИЙ ПРОВАЛ! 💀';
            resultType = 'critical_failure';
            statChanges = choice.criticalFailure || {};
            gameState.tension = Math.min(100, gameState.tension + 25);
            gameState.sanity = Math.max(0, gameState.sanity - 15);
        } else {
            resultText += 'ПРОВАЛ 😅';
            resultType = 'failure';
            statChanges = choice.failure || {};
            gameState.tension = Math.min(100, gameState.tension + 10);
            gameState.sanity = Math.max(0, gameState.sanity - 5);
        }
        
        // Применяем изменения
        if (statChanges.clues) gameState.clues = Math.min(3, gameState.clues + statChanges.clues);
        if (statChanges.sanity) gameState.sanity = Math.min(100, Math.max(0, gameState.sanity + statChanges.sanity));
        if (statChanges.strength) gameState.strength = Math.min(10, Math.max(0, gameState.strength + statChanges.strength));
        if (statChanges.charisma) gameState.charisma = Math.min(10, Math.max(0, gameState.charisma + statChanges.charisma));
        if (statChanges.intellect) gameState.intellect = Math.min(10, Math.max(0, gameState.intellect + statChanges.intellect));
        if (statChanges.inventory) gameState.inventory.push(...statChanges.inventory);
        if (statChanges.memory) gameState.memory.unshift(statChanges.memory);
        if (statChanges.faction) {
            Object.entries(statChanges.faction).forEach(([f, v]) => {
                gameState.factionReputation[f] = (gameState.factionReputation[f] || 0) + v;
            });
        }
        
        addMessage(resultText, true);
        gameState.messagesHistory.push({ text: resultText, isUser: true });
        
        updateUI();
        
        // Проверяем концовки
        if (gameState.clues >= 3) {
            triggerEnding("ПОБЕДА: Вы собрали все улики и раскрыли заговор!");
            return;
        }
        if (gameState.sanity <= 0) {
            triggerEnding("ПОРАЖЕНИЕ: Ваш рассудок shattered... Вы слышите голоса, которые становятся всё громче.");
            return;
        }
        if (gameState.tension >= 100) {
            triggerEnding("⚠️ КРИЗИС: Напряжение достигло предела! Враги нападают внезапно, и вы не готовы.");
            return;
        }
        
        // Отправляем действие в ИИ
        await sendToAI(choice.text, resultType, statChanges);
    }
    
    // ==================== ОТПРАВКА В API ====================
    async function sendToAI(actionText, resultType, changes) {
        isWaiting = true;
        document.getElementById('statusText').innerText = 'ИИ думает...';
        
        // Формируем промпт с памятью
        const systemPrompt = `Ты — мастер в жанре "${gameState.currentTopic}". Стиль: чёрный юмор Disco Elysium + цинизм Ведьмака.

СОСТОЯНИЕ МИРА:
- Улики: ${gameState.clues}/3
- Рассудок: ${gameState.sanity}%
- Напряжение: ${gameState.tension}%
- Сила: ${gameState.strength}, Харизма: ${gameState.charisma}, Интеллект: ${gameState.intellect}
- Инвентарь: ${gameState.inventory.join(', ') || 'пусто'}

ПАМЯТЬ СОБЫТИЙ (последние 10):
${gameState.memory.slice(0, 10).map((m, i) => `${i+1}. ${m}`).join('\n')}

ОТНОШЕНИЯ:
${Object.entries(gameState.factionReputation).map(([f, v]) => `${f}: ${v}`).join(', ')}

ИГРОК СОВЕРШИЛ: "${actionText}" → Результат: ${resultType}

ОТВЕТЬ:
1. Опиши последствия действия с юмором (2-4 предложения)
2. Добавь 3 варианта СЛЕДУЩИХ действий с характеристиками и сложностями.
ФОРМАТ:
[ОПИСАНИЕ]
ВЫБОРЫ:
1. [ХАР-КА: ЗНАЧЕНИЕ] Текст действия | сложность/easy/medium/hard | успех: что даёт | провал: что даёт | крит успех | крит провал

Пример выбора:
1. [СИЛА: 6] Выбить дверь ногой | hard | успех: {clues:1} | провал: {sanity:-5} | крит успех: {clues:2, inventory:["Ключ"]} | крит провал: {sanity:-15, tension:20}`;
        
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "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" // Замените на ваш ключ
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-exp",
                    messages: [
                        { role: "system", content: systemPrompt },
                        ...gameState.messagesHistory.slice(-15).map(m => ({
                            role: m.isUser ? "user" : "assistant",
                            content: m.text
                        }))
                    ],
                    temperature: 0.95,
                    max_tokens: 1000
                })
            });
            
            const data = await response.json();
            const aiResponse = data.choices[0].message.content;
            
            addMessage(aiResponse.split('ВЫБОРЫ:')[0], false);
            gameState.messagesHistory.push({ text: aiResponse.split('ВЫБОРЫ:')[0], isUser: false });
            
            // Парсим варианты выбора
            const choicesMatch = aiResponse.match(/ВЫБОРЫ:\s*([\s\S]*)/);
            if (choicesMatch) {
                parseChoices(choicesMatch[1]);
            }
            
        } catch(e) {
            addMessage("Ошибка связи с ИИ. Попробуйте ещё раз.", false);
            console.error(e);
        }
        
        isWaiting = false;
        document.getElementById('statusText').innerText = 'ваш ход';
    }
    
    function parseChoices(choicesText) {
        const choicesContainer = document.getElementById('messagesContainer');
        
        // Удаляем старые кнопки
        const oldContainer = document.querySelector('.choices-container');
        if (oldContainer) oldContainer.remove();
        
        const lines = choicesText.split('\n').filter(l => l.trim().match(/^\d+\./));
        const newContainer = document.createElement('div');
        newContainer.className = 'choices-container';
        
        lines.forEach(line => {
            const match = line.match(/(\d+)\.\s*\[(\w+):\s*(\d+)\]\s*(.+?)\s*\|\s*(\w+)\s*\|\s*успех:\s*({[^}]+})\s*\|\s*провал:\s*({[^}]+})/i);
            if (match) {
                const [_, num, statName, statValue, text, difficulty, successStr, failureStr] = match;
                
                const parseChanges = (str) => {
                    try {
                        return JSON.parse(str.replace(/'/g, '"'));
                    } catch { return {}; }
                };
                
                const choice = {
                    text: text.trim(),
                    statName: statName.toLowerCase(),
                    statValue: parseInt(statValue),
                    difficulty: difficulty.toLowerCase(),
                    success: parseChanges(successStr),
                    failure: parseChanges(failureStr),
                    criticalSuccess: {},
                    criticalFailure: {}
                };
                
                const chance = calculateChance(choice.statValue, choice.difficulty);
                const chanceClass = chance >= 70 ? 'chance-high' : (chance >= 40 ? 'chance-medium' : 'chance-low');
                
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = `
                    <span>${choice.text}</span>
                    <span class="choice-chance ${chanceClass}">${chance}%</span>
                `;
                btn.onclick = () => resolveAction(choice);
                newContainer.appendChild(btn);
            }
        });
        
        document.getElementById('messagesContainer').appendChild(newContainer);
        document.getElementById('messagesContainer').scrollTop = document.getElementById('messagesContainer').scrollHeight;
    }
    
    // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
    function addMessage(text, isUser) {
        const container = document.getElementById('messagesContainer');
        const empty = container.querySelector('.empty-state');
        if (empty) empty.remove();
        
        const msg = document.createElement('div');
        msg.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
        msg.innerHTML = `<div class="message-content">${text.replace(/\n/g, '<br>')}</div>`;
        container.appendChild(msg);
        container.scrollTop = container.scrollHeight;
    }
    
    function triggerEnding(endingText) {
        gameState.gameActive = false;
        addMessage(`\n🎭 КОНЦОВКА: ${endingText} 🎭\n`, false);
        addMessage("Игра завершена. Нажмите «Новая игра», чтобы начать заново.", false);
        document.getElementById('startBtn').innerHTML = '🎲 НОВАЯ ИГРА';
    }
    
    function startGame() {
        gameState = {
            clues: 0, sanity: 100, tension: 0,
            strength: 5, charisma: 5, intellect: 5,
            inventory: [], memory: [],
            factionReputation: { "Городская стража": 0, "Преступный мир": 0, "Таинственный орден": 0 },
            storyFlags: { metCaptain: false, helpedThief: false, foundSecret: false },
            gameActive: true, gameStarted: true,
            currentTopic: document.getElementById('topicInput')?.value || "таинственный нуар",
            messagesHistory: [],
            turnCount: 0
        };
        document.getElementById('gameTitle').innerText = gameState.currentTopic;
        updateUI();
        document.getElementById('messagesContainer').innerHTML = '';
        addMessage("🌑 Игра началась. Мир живёт своей жизнью. Каждое решение имеет последствия...", false);
        sendToAI("игрок начинает приключение", "new_game", {});
    }
    
    function saveGame() {
        localStorage.setItem('darkScriptSave', JSON.stringify({
            state: gameState,
            history: gameState.messagesHistory
        }));
        addMessage("💾 Игра сохранена", false);
    }
    
    function loadGame() {
        const saved = localStorage.getItem('darkScriptSave');
        if (saved) {
            const data = JSON.parse(saved);
            gameState = data.state;
            gameState.messagesHistory = data.history || [];
            updateUI();
            document.getElementById('messagesContainer').innerHTML = '';
            gameState.messagesHistory.forEach(msg => addMessage(msg.text, msg.isUser));
            addMessage("📀 Загрузка завершена", false);
        } else {
            addMessage("Нет сохранений", false);
        }
    }
    
    function shareHistory() {
        let text = `Dark Script — ${gameState.currentTopic}\n`;
        text += `Результат: улик ${gameState.clues}/3, рассудок ${gameState.sanity}%, напряжение ${gameState.tension}%\n`;
        text += `Инвентарь: ${gameState.inventory.join(', ') || 'пусто'}\n\n`;
        text += gameState.messagesHistory.map(m => `${m.isUser ? '> ' : ''}${m.text}`).join('\n\n');
        
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `dark_script_${Date.now()}.txt`;
        a.click();
    }
    
    // ==================== ИНИЦИАЛИЗАЦИЯ ====================
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('saveBtn').addEventListener('click', saveGame);
    document.getElementById('loadBtn').addEventListener('click', loadGame);
    document.getElementById('shareBtn').addEventListener('click', shareHistory);
    
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    
    menuBtn.onclick = () => {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    };
    overlay.onclick = () => {
        sidebar.classList.remove('open');
        overlay.classList.remove('active');
    };
    
    updateUI();
    lucide.createIcons();
</script>
</body>
</html>
